{"id":"bio3_1","inst":"Think about genetics.","txt":"A gene for brown eyes (B) is dominant over blue eyes (b). If both parents are Bb, what percentage of offspring could have blue eyes?","opts":["0%","25%","50%"],"cor":1,"exp":"Using a Punnett square: BB, Bb, Bb, bb. Only bb (25%) would show blue eyes, since blue is recessive and needs two copies of the b allele."},
{"id":"bio3_2","inst":"Think about natural selection.","txt":"In a population of moths, dark moths survive better on soot-covered trees. Over many generations, what happens?","opts":["All moths turn dark","The proportion of dark moths increases","Light moths learn to change colour"],"cor":1,"exp":"This is natural selection: dark moths survive better (camouflage), reproduce more, and pass on their genes. Over generations, the proportion of dark moths in the population increases."},
{"id":"bio3_3","inst":"Think about the nervous system.","txt":"Put these in the correct order for a reflex arc: effector, receptor, relay neuron, sensory neuron, motor neuron","opts":["receptor, sensory, relay, motor, effector","sensory, receptor, relay, effector, motor","receptor, relay, sensory, motor, effector"],"cor":0,"exp":"A reflex arc: receptor (detects stimulus) -> sensory neuron -> relay neuron (in spinal cord) -> motor neuron -> effector (muscle or gland that responds)."},
{"id":"bio3_4","inst":"Think about osmosis.","txt":"A plant cell is placed in pure water. What will happen?","opts":["It will burst","It will become turgid (firm)","It will shrink"],"cor":1,"exp":"Water moves into the cell by osmosis (from high water concentration outside to low inside). The cell wall prevents it from bursting, so it becomes turgid (firm and swollen). This is how plants stay upright."}
]};
const SCI_CHEM={"1":[
{"id":"chem1_1","inst":"Look at this atom diagram.","shape":"atom","txt":"What are the three types of particle found in an atom?","opts":["Protons, neutrons, electrons","Protons, photons, electrons","Atoms, molecules, elements"],"cor":0,"exp":"Atoms contain: protons (positive, in nucleus), neutrons (neutral, in nucleus), and electrons (negative, orbiting the nucleus)."},
{"id":"chem1_2","inst":"Look at the pH scale.","shape":"ph_scale","txt":"Lemon juice has a pH of 2. Is it an acid, alkali, or neutral?","opts":["Neutral","Alkali","Acid"],"cor":2,"exp":"A pH below 7 is acidic. pH 2 is strongly acidic. The pH scale goes from 0 (most acidic) to 14 (most alkaline), with 7 being neutral (like pure water)."},
{"id":"chem1_3","inst":"Think about states of matter.","txt":"When a solid is heated to its melting point, it becomes a:","opts":["Gas","Liquid","Plasma"],"cor":1,"exp":"When a solid reaches its melting point, it changes state to a liquid. The particles gain energy and move more freely, breaking out of their fixed positions."},
{"id":"chem1_4","inst":"Think about materials.","txt":"Which of these changes is REVERSIBLE?","opts":["Burning wood","Cooking an egg","Melting chocolate"],"cor":2,"exp":"Melting chocolate is reversible - you can cool it and it solidifies again. Burning and cooking cause permanent chemical changes that cannot be undone."},
{"id":"chem1_5","inst":"Think about mixtures.","txt":"What is the best method to separate sand from water?","opts":["Evaporation","Filtration","Distillation"],"cor":1,"exp":"Filtration works because sand particles are too big to pass through filter paper, while water molecules pass through easily. The sand stays on the filter paper."},
{"id":"chem1_6","inst":"Think about elements.","txt":"What is an element?","opts":["A mixture of different atoms","A substance made of only one type of atom","A compound of two elements"],"cor":1,"exp":"An element is a pure substance made of only one type of atom. For example, gold (Au) contains only gold atoms. There are about 118 known elements listed in the periodic table."},
{"id":"chem1_7","inst":"Think about chemical reactions.","txt":"What is always true about a chemical reaction?","opts":["It can always be reversed","New substances are formed","It always produces gas"],"cor":1,"exp":"In a chemical reaction, the atoms rearrange to form new substances with different properties. Signs of a chemical reaction include colour change, gas production, temperature change, or a new smell."},
{"id":"chem1_8","inst":"Look at the pH scale.","shape":"ph_scale","txt":"What pH value is neutral?","opts":["0","7","14"],"cor":1,"exp":"pH 7 is neutral (like pure water). Below 7 is acidic (like lemon juice at pH 2), above 7 is alkaline (like bleach at pH 13)."},
{"id":"chem1_9","inst":"Think about materials.","txt":"Which property makes metals good for making electrical wires?","opts":["They are shiny","They conduct electricity","They are magnetic"],"cor":1,"exp":"Metals are good electrical conductors because they have free-moving electrons that can carry an electrical current. Copper is most commonly used for wires."},
{"id":"chem1_10","inst":"Think about molecules.","txt":"What is the chemical formula for water?","opts":["H2O","CO2","O2"],"cor":0,"exp":"Water is H2O: two hydrogen atoms bonded to one oxygen atom. CO2 is carbon dioxide, and O2 is oxygen gas."},
{"id":"chem1_11","inst":"Think about particles.","txt":"In which state of matter are particles closest together and vibrating in fixed positions?","opts":["Solid","Liquid","Gas"],"cor":0,"exp":"In a solid, particles are packed closely in fixed positions and can only vibrate. In liquids they can slide past each other, and in gases they move freely in all directions."},
{"id":"chem1_12","inst":"Think about reactions.","txt":"What does an acid and an alkali make when mixed together?","opts":["A stronger acid","A salt and water","An element"],"cor":1,"exp":"Acid + Alkali -> Salt + Water. This is called a neutralisation reaction. The acid and alkali cancel each other out."}
],"2":[
{"id":"chem2_1","inst":"Think about the periodic table.","txt":"Elements in the same GROUP of the periodic table have:","opts":["The same number of protons","Similar chemical properties","The same mass"],"cor":1,"exp":"Elements in the same group have the same number of electrons in their outer shell, which gives them similar chemical properties. For example, Group 1 metals (Li, Na, K) all react vigorously with water."},
{"id":"chem2_2","inst":"Think about reactions.","txt":"Iron + oxygen -> iron oxide. This is an example of:","opts":["Combustion","Oxidation","Neutralisation"],"cor":1,"exp":"When iron reacts with oxygen it is oxidised, forming iron oxide (rust). Oxidation is the gain of oxygen. The reverse (losing oxygen) is called reduction."},
{"id":"chem2_3","inst":"Think about conservation of mass.","txt":"In a chemical reaction, the total mass of the products is:","opts":["More than the reactants","Less than the reactants","Equal to the reactants"],"cor":2,"exp":"The law of conservation of mass states that atoms are not created or destroyed in a chemical reaction, they just rearrange. So total mass stays the same."},
{"id":"chem2_4","inst":"Think about atoms.","shape":"atom","txt":"An atom has 6 protons, 6 neutrons, and 6 electrons. What is its mass number?","opts":["6","12","18"],"cor":1,"exp":"Mass number = protons + neutrons = 6 + 6 = 12. Electrons have negligible mass so are not counted. This is a carbon atom (C-12)."},
{"id":"chem2_5","inst":"Think about compounds.","txt":"What is the difference between a mixture and a compound?","opts":["Mixtures are chemically bonded, compounds are not","Compounds are chemically bonded, mixtures are not","There is no difference"],"cor":1,"exp":"In a compound, atoms of different elements are chemically bonded in fixed proportions (e.g., H2O). In a mixture, substances are just physically combined and can be separated easily."},
{"id":"chem2_6","inst":"Think about reactions.","txt":"Magnesium + hydrochloric acid -> magnesium chloride + ?","opts":["Water","Oxygen","Hydrogen"],"cor":2,"exp":"Metal + acid -> salt + hydrogen gas. The hydrogen gas can be tested with a burning splint (it makes a squeaky pop)."},
{"id":"chem2_7","inst":"Think about separation.","txt":"Which separation technique is best for obtaining pure water from salty water?","opts":["Filtration","Distillation","Chromatography"],"cor":1,"exp":"Distillation heats the solution to boil the water (leaving salt behind), then cools the water vapour back into pure liquid water in a condenser."},
{"id":"chem2_8","inst":"Think about energy changes.","txt":"An exothermic reaction:","opts":["Takes in energy from surroundings","Releases energy to surroundings","Has no energy change"],"cor":1,"exp":"Exothermic reactions release energy (usually as heat), making the surroundings warmer. Examples: combustion, neutralisation. Endothermic reactions absorb energy."}
],"3":[
{"id":"chem3_1","inst":"Think about bonding.","txt":"Sodium chloride (table salt) is an ionic compound. How is it formed?","opts":["Atoms share electrons","Sodium transfers electrons to chlorine","Atoms are held by weak forces"],"cor":1,"exp":"Ionic bonding: sodium (metal) transfers its outer electron to chlorine (non-metal). Sodium becomes Na+ and chlorine becomes Cl-. The opposite charges attract strongly."},
{"id":"chem3_2","inst":"Think about rates of reaction.","txt":"Which of these would NOT increase the rate of a chemical reaction?","opts":["Increasing temperature","Increasing concentration","Increasing the size of solid pieces"],"cor":2,"exp":"Larger pieces have less surface area exposed, so the reaction is SLOWER. To speed up: increase temperature, concentration, surface area (smaller pieces), or add a catalyst."},
{"id":"chem3_3","inst":"Balance this equation.","txt":"How many molecules of oxygen are needed to balance: CH4 + O2 -> CO2 + 2H2O?","opts":["1","2","3"],"cor":1,"exp":"CH4 + 2O2 -> CO2 + 2H2O. Left: 1C, 4H, 4O. Right: 1C, 4H, 4O. Balanced! We need 2 molecules of O2."},
{"id":"chem3_4","inst":"Think about electrolysis.","txt":"During electrolysis of copper sulfate solution, what forms at the negative electrode (cathode)?","opts":["Oxygen gas","Copper metal","Hydrogen gas"],"cor":1,"exp":"Positive copper ions (Cu2+) are attracted to the negative cathode, where they gain electrons and form solid copper metal. This is how copper is purified industrially."}
]};
const SCI_PHYS={"1":[
{"id":"phys1_1","inst":"Look at this force diagram.","shape":"forces_balanced","txt":"If two forces of equal size push an object from opposite sides, the object will:","opts":["Speed up","Stay still or keep moving at the same speed","Slow down"],"cor":1,"exp":"When forces are balanced (equal and opposite), there is no change in motion. The object either stays still or continues at the same constant speed. This is Newton's First Law."},
{"id":"phys1_2","inst":"Look at this circuit diagram.","shape":"circuit_series","txt":"In a series circuit with two bulbs, what happens if one bulb breaks?","opts":["The other bulb stays on","Both bulbs go off","The other bulb gets brighter"],"cor":1,"exp":"In a series circuit, there is only ONE path for the current. If one bulb breaks, the circuit is broken and no current can flow, so both bulbs go off."},
{"id":"phys1_3","inst":"Look at this parallel circuit.","shape":"circuit_parallel","txt":"In a parallel circuit, if one bulb breaks, what happens to the other?","opts":["It goes off too","It stays on","It gets dimmer"],"cor":1,"exp":"In a parallel circuit, each bulb has its own path. If one breaks, current still flows through the other path, so the remaining bulb stays on."},
{"id":"phys1_4","inst":"Think about energy.","shape":"energy_transfer","txt":"A moving car has what type of energy?","opts":["Chemical energy","Kinetic energy","Thermal energy"],"cor":1,"exp":"Kinetic energy is the energy of movement. Anything that is moving has kinetic energy. The faster it moves and the heavier it is, the more kinetic energy it has."},
{"id":"phys1_5","inst":"Think about forces.","txt":"What unit is force measured in?","opts":["Watts (W)","Newtons (N)","Joules (J)"],"cor":1,"exp":"Force is measured in Newtons (N), named after Sir Isaac Newton. Weight is a force (gravity pulling you down), so your weight is measured in Newtons too."},
{"id":"phys1_6","inst":"Think about energy.","shape":"energy_transfer","txt":"Energy cannot be created or destroyed, only:","opts":["Multiplied","Transferred or transformed","Deleted"],"cor":1,"exp":"This is the law of conservation of energy. Energy can transfer between stores (e.g., chemical to kinetic to thermal) but the total amount of energy always stays the same."},
{"id":"phys1_7","inst":"Think about sound.","shape":"wave","txt":"Sound travels fastest through which material?","opts":["Air","Water","Steel"],"cor":2,"exp":"Sound travels fastest through solids like steel because the particles are closest together, so vibrations pass between them quickly. Speed: steel > water > air."},
{"id":"phys1_8","inst":"Look at this wave.","shape":"wave","txt":"The letter A on the diagram shows the:","opts":["Wavelength","Frequency","Amplitude"],"cor":2,"exp":"Amplitude is the maximum displacement from the rest position (the height of the wave). It relates to the loudness of sound or brightness of light."},
{"id":"phys1_9","inst":"Think about light.","txt":"Light travels in:","opts":["Curved lines","Straight lines","Zigzag patterns"],"cor":1,"exp":"Light travels in straight lines (we call these rays). This is why shadows form - light cannot bend around opaque objects."},
{"id":"phys1_10","inst":"Think about electricity.","txt":"Which of these materials is an electrical conductor?","opts":["Rubber","Wood","Copper"],"cor":2,"exp":"Copper is a metal and an excellent electrical conductor because it has free electrons that can carry electric current. Rubber and wood are insulators."},
{"id":"phys1_11","inst":"Think about magnets.","shape":"magnet","txt":"What happens when you bring two north poles of magnets together?","opts":["They attract","They repel","Nothing happens"],"cor":1,"exp":"Like poles repel (N-N or S-S push apart). Unlike poles attract (N-S pull together). This is the fundamental rule of magnetism."},
{"id":"phys1_12","inst":"Think about gravity.","txt":"What is the approximate gravitational field strength on Earth?","opts":["5 N/kg","10 N/kg","15 N/kg"],"cor":1,"exp":"On Earth, g is approximately 10 N/kg (more precisely 9.8). This means a 1 kg mass has a weight of about 10 Newtons. Weight = mass x gravitational field strength."}
],"2":[
{"id":"phys2_1","inst":"Think about speed.","txt":"A car travels 120 km in 2 hours. What is its average speed?","opts":["60 km/h","120 km/h","240 km/h"],"cor":0,"exp":"Speed = distance / time = 120 km / 2 hours = 60 km/h. This is the average speed - the car may have gone faster or slower at different points."},
{"id":"phys2_2","inst":"Think about pressure.","txt":"A box weighs 600 N and sits on a base area of 2 m squared. What is the pressure it exerts?","opts":["300 Pa","600 Pa","1200 Pa"],"cor":0,"exp":"Pressure = Force / Area = 600 N / 2 m2 = 300 Pa (Pascals). Smaller area = more pressure (this is why sharp knives cut better than blunt ones)."},
{"id":"phys2_3","inst":"Think about work and energy.","txt":"A force of 50 N moves an object 4 metres. How much work is done?","opts":["12.5 J","54 J","200 J"],"cor":2,"exp":"Work = Force x Distance = 50 N x 4 m = 200 Joules. Work is the energy transferred when a force moves an object."},
{"id":"phys2_4","inst":"Think about electricity.","shape":"circuit_series","txt":"A circuit has a voltage of 12V and a current of 3A. What is the resistance?","opts":["4 ohms","36 ohms","15 ohms"],"cor":0,"exp":"Using Ohm's Law: V = I x R, so R = V / I = 12V / 3A = 4 ohms. Resistance is how much a component opposes the flow of current."},
{"id":"phys2_5","inst":"Think about waves.","shape":"wave","txt":"A wave has a frequency of 5 Hz and a wavelength of 3m. What is its speed?","opts":["1.67 m/s","8 m/s","15 m/s"],"cor":2,"exp":"Wave speed = frequency x wavelength = 5 Hz x 3 m = 15 m/s. Frequency means 5 complete waves pass a point every second."},
{"id":"phys2_6","inst":"Think about density.","txt":"An object has a mass of 500g and a volume of 250 cm cubed. What is its density?","opts":["0.5 g/cm3","2 g/cm3","750 g/cm3"],"cor":1,"exp":"Density = mass / volume = 500g / 250 cm3 = 2 g/cm3. Since water has a density of 1 g/cm3, this object would sink."},
{"id":"phys2_7","inst":"Think about forces.","txt":"A 70 kg person stands on Earth (g = 10 N/kg). What is their weight?","opts":["7 N","70 N","700 N"],"cor":2,"exp":"Weight = mass x gravitational field strength = 70 kg x 10 N/kg = 700 N. Weight is a force (measured in Newtons), mass is an amount of matter (measured in kg)."},
{"id":"phys2_8","inst":"Think about efficiency.","txt":"A light bulb uses 100J of energy but only 25J becomes light. What is its efficiency?","opts":["25%","50%","75%"],"cor":0,"exp":"Efficiency = useful energy output / total energy input x 100 = 25/100 x 100 = 25%. The other 75J is wasted as heat."}
],"3":[
{"id":"phys3_1","inst":"Think about motion.","txt":"A car accelerates from 0 to 20 m/s in 5 seconds. What is its acceleration?","opts":["4 m/s2","25 m/s2","100 m/s2"],"cor":0,"exp":"Acceleration = change in velocity / time = (20 - 0) / 5 = 4 m/s2. This means the car gets 4 m/s faster every second."},
{"id":"phys3_2","inst":"Think about Newton's laws.","txt":"A 5 kg object is pushed with a force of 20 N. What is its acceleration? (F = ma)","opts":["4 m/s2","100 m/s2","25 m/s2"],"cor":0,"exp":"F = ma, so a = F/m = 20N / 5kg = 4 m/s2. Newton's Second Law: the acceleration of an object is proportional to the force and inversely proportional to its mass."},
{"id":"phys3_3","inst":"Think about electromagnetism.","txt":"How can you increase the strength of an electromagnet?","opts":["Use fewer coils","Increase the current","Use a wooden core"],"cor":1,"exp":"Increasing the current makes the magnetic field stronger. You can also: add more coils of wire, or use an iron core (instead of wood or air)."},
{"id":"phys3_4","inst":"Think about energy.","txt":"A 2 kg ball is lifted 5m high (g = 10 N/kg). What gravitational potential energy does it gain?","opts":["10 J","50 J","100 J"],"cor":2,"exp":"GPE = mass x g x height = 2 x 10 x 5 = 100 J. This energy is stored due to the ball's position in the gravitational field."}
]};
const SCI_EARTH={"1":[
{"id":"earth1_1","inst":"Look at the solar system.","shape":"solar_system","txt":"Which planet is closest to the Sun?","opts":["Venus","Earth","Mercury"],"cor":2,"exp":"The order from the Sun is: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune. Mercury is the smallest and closest planet to the Sun."},
{"id":"earth1_2","inst":"Look at the solar system.","shape":"solar_system","txt":"Which is the largest planet in our solar system?","opts":["Saturn","Jupiter","Neptune"],"cor":1,"exp":"Jupiter is by far the largest planet. It is so big that all other planets could fit inside it. It is a gas giant made mostly of hydrogen and helium."},
{"id":"earth1_3","inst":"Look at the rock cycle.","shape":"rock_cycle","txt":"What type of rock is formed when magma or lava cools and solidifies?","opts":["Sedimentary","Metamorphic","Igneous"],"cor":2,"exp":"Igneous rocks form when molten rock (magma underground or lava on the surface) cools and crystallises. Examples: granite (slow cooling, large crystals), basalt (fast cooling, small crystals)."},
{"id":"earth1_4","inst":"Look at the rock cycle.","shape":"rock_cycle","txt":"What turns sedimentary rock into metamorphic rock?","opts":["Melting","Heat and pressure","Weathering"],"cor":1,"exp":"When sedimentary rocks are subjected to extreme heat and pressure deep underground (but not enough to melt them), they change form into metamorphic rocks. Example: limestone becomes marble."},
{"id":"earth1_5","inst":"Look at the water cycle.","shape":"water_cycle","txt":"What process turns liquid water into water vapour?","opts":["Condensation","Precipitation","Evaporation"],"cor":2,"exp":"Evaporation is when liquid water is heated (usually by the Sun) and turns into water vapour (gas). This water vapour rises into the atmosphere."},
{"id":"earth1_6","inst":"Look at the water cycle.","shape":"water_cycle","txt":"What is condensation?","opts":["Water vapour turning into liquid droplets","Liquid water turning into gas","Rain falling from clouds"],"cor":0,"exp":"Condensation is when water vapour (gas) cools and turns back into tiny liquid water droplets. This is how clouds form - water vapour rises, cools, and condenses around dust particles."},
{"id":"earth1_7","inst":"Think about the Earth.","txt":"What causes day and night?","opts":["The Earth orbiting the Sun","The Earth rotating on its axis","The Moon blocking the Sun"],"cor":1,"exp":"The Earth spins (rotates) on its axis once every 24 hours. The side facing the Sun has day, and the side facing away has night."},
{"id":"earth1_8","inst":"Think about seasons.","txt":"Why does the UK have warmer summers?","opts":["The Earth is closer to the Sun in summer","The North Pole is tilted towards the Sun in summer","The Sun is hotter in summer"],"cor":1,"exp":"The Earth's axis is tilted at 23.5 degrees. In summer, the Northern Hemisphere is tilted towards the Sun, so sunlight hits more directly and days are longer, making it warmer."},
{"id":"earth1_9","inst":"Think about space.","txt":"How long does it take for the Earth to orbit the Sun once?","opts":["24 hours","1 month","1 year (365.25 days)"],"cor":2,"exp":"The Earth takes approximately 365.25 days to complete one orbit around the Sun. The extra 0.25 days is why we have a leap year every 4 years."},
{"id":"earth1_10","inst":"Think about the atmosphere.","txt":"Which gas makes up most of the Earth's atmosphere?","opts":["Oxygen","Carbon dioxide","Nitrogen"],"cor":2,"exp":"The atmosphere is about 78% nitrogen, 21% oxygen, and small amounts of other gases including argon and carbon dioxide (only 0.04%)."},
{"id":"earth1_11","inst":"Think about weather.","txt":"What causes wind?","opts":["The Moon's gravity","Differences in air pressure","The Earth spinning"],"cor":1,"exp":"Wind is caused by differences in air pressure. Air moves from areas of high pressure to areas of low pressure. The bigger the difference, the stronger the wind."},
{"id":"earth1_12","inst":"Think about rocks.","txt":"Which type of rock is formed from layers of sediment being compressed over millions of years?","opts":["Igneous","Metamorphic","Sedimentary"],"cor":2,"exp":"Sedimentary rocks form when layers of sediment (small bits of rock, sand, mud, or dead organisms) are deposited and slowly compressed over millions of years. Examples: sandstone, limestone, chalk."}
],"2":[
{"id":"earth2_1","inst":"Think about the Earth's structure.","txt":"The Earth is made of layers. From outside to centre, the correct order is:","opts":["Core, mantle, crust","Crust, mantle, core","Mantle, crust, core"],"cor":1,"exp":"Crust (thin outer layer, 5-70km), Mantle (thick semi-solid layer, about 2900km), Outer Core (liquid iron/nickel), Inner Core (solid iron/nickel, extremely hot)."},
{"id":"earth2_2","inst":"Think about plate tectonics.","txt":"What happens at a destructive plate boundary?","opts":["Plates move apart","One plate is pushed under another","Plates slide past each other"],"cor":1,"exp":"At a destructive boundary, an oceanic plate (denser) is pushed under a continental plate (less dense) in a process called subduction. This can cause earthquakes and volcanoes."},
{"id":"earth2_3","inst":"Think about climate change.","txt":"The greenhouse effect is caused by gases that:","opts":["Block all sunlight from reaching Earth","Trap heat radiation leaving Earth's surface","Create holes in the atmosphere"],"cor":1,"exp":"Greenhouse gases (CO2, methane, water vapour) let sunlight through to warm the Earth, but trap the infrared radiation (heat) that the Earth emits, warming the atmosphere."},
{"id":"earth2_4","inst":"Think about space.","txt":"The Moon causes tides on Earth. How?","opts":["By blowing on the water","By its gravitational pull on the oceans","By reflecting sunlight onto the water"],"cor":1,"exp":"The Moon's gravity pulls on Earth's oceans, creating a bulge of water (high tide) on the side nearest the Moon and another on the opposite side. As Earth rotates, we get two high tides per day."},
{"id":"earth2_5","inst":"Think about fossils.","txt":"Fossils are most commonly found in which type of rock?","opts":["Igneous","Sedimentary","Metamorphic"],"cor":1,"exp":"Fossils form when organisms are buried in sediment that slowly turns to rock. Igneous rock forms from hot magma (destroying any remains), and metamorphic conditions usually destroy fossils too."},
{"id":"earth2_6","inst":"Think about renewable energy.","txt":"Which of these is a renewable energy source?","opts":["Coal","Natural gas","Wind"],"cor":2,"exp":"Wind is renewable - it will not run out. Coal and natural gas are fossil fuels (non-renewable) - they took millions of years to form and are being used up much faster than they form."}
],"3":[
{"id":"earth3_1","inst":"Think about carbon cycle.","txt":"How do fossil fuels contribute to climate change when burned?","opts":["They release stored carbon as CO2","They destroy the ozone layer","They change Earth's orbit"],"cor":0,"exp":"Fossil fuels contain carbon that was stored millions of years ago. Burning them releases CO2 back into the atmosphere, increasing the greenhouse effect and causing global warming."},
{"id":"earth3_2","inst":"Think about space.","txt":"A light-year is a measure of:","opts":["Time","Distance","Speed"],"cor":1,"exp":"A light-year is the DISTANCE that light travels in one year (about 9.46 trillion km). It is used because distances in space are so vast that using km would give impossibly large numbers."},
{"id":"earth3_3","inst":"Think about Earth science.","txt":"What is the theory of plate tectonics?","opts":["The Earth's crust is one solid piece","The Earth's crust is broken into plates that move slowly on the mantle","The Earth's crust is shrinking"],"cor":1,"exp":"Plate tectonics: Earth's crust is broken into large pieces (tectonic plates) that float on the semi-liquid mantle. They move slowly (a few cm/year) causing earthquakes, volcanoes, and mountain formation."}
]};

    ['wholeNumbers','Ch 1: Whole Numbers','Place value, rounding, exponents, operations','#1976D2'],

    ['algebra','Ch 8: Algebra','Expressions, substitution, like terms, formulae','#1565C0'],
    ['percentage','Ch 9: Percentage','Conversions, finding %, increase/decrease, discount','#2E7D32'],
    ['equations','Ch 10: Equations','Solving, flowcharts, word problems, inverse operations','#AD1457'],
    ['polygons','Ch 11: Polygons','Triangles, quadrilaterals, angle sums, exterior angles','#E65100'],

    ['volumeMass','Ch 14: Volume & Mass','Volume, capacity, mass, unit conversions','#283593'],
    ['coordGeometry','Ch 15: Coordinate Geometry','Plotting, quadrants, midpoint, equations of lines','#BF360C'],
    ['ratioRates','Ch 16: Ratio & Rates','Simplifying, sharing, unit cost, scale, speed','#33691E'],

function ib7Card(subj,topic,title,desc,color){
  var s=S.ib7[topic]||{lv:1,ok:0,no:0};
  var pct=s.ok+s.no>0?Math.round(s.ok/(s.ok+s.no)*100):0;
  var sywKey=subj+'_'+topic;
  var hasSyw=SYW[sywKey]&&SYW[sywKey][String(s.lv)]&&SYW[sywKey][String(s.lv)].length>0;
  return `<div style="background:var(--card);border-radius:12px;padding:14px;border-left:4px solid ${color}">
    <h3 style="margin:0 0 4px;color:${color};font-size:0.95em">${title}</h3>

  });
  html+='</div>';
  SC.innerHTML=html;
}

// === QUIZ ENGINE ===
function startQuiz(subj,topic){
  let s=S[subj][topic];
  let lv=String(s.lv);
  let bank;
  if(subj==='english'){
    if(topic==='punctuation') bank=PQ[lv]||[];
    else if(topic==='reading'){startReading(subj,topic);return;}
    else if(topic==='writing'){startWriting(subj,topic);return;}
    else bank=[];
  } else if(subj==='maths'){
    if(topic==='geometry') bank=GQ[lv]||[];
    else if(topic==='problemSolving') bank=PS[lv]||[];
    else if(topic==='number') bank=NQ[lv]||[];
    else bank=[];
  } else if(subj==='ib7'){
    if(topic==='wholeNumbers') bank=MYP_CH1[lv]||[];
    else if(topic==='numberProperties') bank=MYP_CH2[lv]||[];
    else if(topic==='linesAngles') bank=MYP_CH3[lv]||[];
    else if(topic==='numberStrategies') bank=MYP_CH4[lv]||[];
    else if(topic==='posNegNumbers') bank=MYP_CH5[lv]||[];
    else if(topic==='fractions') bank=MYP_CH6[lv]||[];
    else if(topic==='decimals') bank=MYP_CH7[lv]||[];
    else if(topic==='algebra') bank=MYP_CH8[lv]||[];
    else if(topic==='percentage') bank=MYP_CH9[lv]||[];
    else if(topic==='equations') bank=MYP_CH10[lv]||[];
    else if(topic==='polygons') bank=MYP_CH11[lv]||[];
    else if(topic==='measurementArea') bank=MYP_CH12[lv]||[];
    else if(topic==='solids') bank=MYP_CH13[lv]||[];
    else if(topic==='volumeMass') bank=MYP_CH14[lv]||[];
    else if(topic==='coordGeometry') bank=MYP_CH15[lv]||[];
    else if(topic==='ratioRates') bank=MYP_CH16[lv]||[];
    else if(topic==='probability') bank=MYP_CH17[lv]||[];
    else if(topic==='statistics') bank=MYP_CH18[lv]||[];
    else if(topic==='transformations') bank=MYP_CH19[lv]||[];
    else bank=[];
  } else if(subj==='science'){
    if(topic==='biology') bank=SCI_BIO[lv]||[];
    else if(topic==='chemistry') bank=SCI_CHEM[lv]||[];
    else if(topic==='physics') bank=SCI_PHYS[lv]||[];
    else if(topic==='earthSpace') bank=SCI_EARTH[lv]||[];
    else bank=[];
  } else { bank=[]; }
  // Prioritise unseen questions
  let unseen=bank.filter(q=>!s.sn.includes(q.id));
  let seen=bank.filter(q=>s.sn.includes(q.id));
  let pool=[...unseen,...seen];
  // Pick 4 MC questions
  let qs=pool.slice(0,Math.min(4,pool.length));
  if(qs.length===0){
    if(hasAIKey()){generateAI(subj,topic);return;}
    alert('No built-in questions for Level '+s.lv+'. Set up an AI key to unlock unlimited questions at higher levels.');return;
  }
  // Mix in 1 open-answer question if available
  let openBank=OPEN_Q[subj+'_'+topic];
  if(openBank){
    let openPool=openBank.filter(q=>!s.sn.includes(q.id));
    if(openPool.length===0) openPool=openBank.slice();
    if(openPool.length>0){
      let openQ=openPool[Math.floor(Math.random()*openPool.length)];
      // Insert open question at position 3 or end
      let pos=Math.min(3,qs.length);
      qs.splice(pos,0,openQ);
    }
  }
  CQ={active:true,subject:subj,topic:topic,questions:qs,idx:0,score:0,answers:[],mode:'mc'};
  renderQuizQuestion();
}

// Image upload handling for open-answer questions
var _uploadedImageData=null;

function previewUploadedImage(){
  var input=document.getElementById('openImage');
  handleImageFile(input);
}
function previewCameraImage(){
  var input=document.getElementById('openCamera');
  handleImageFile(input);
}
function handleImageFile(input){
  if(!input||!input.files||!input.files[0])return;
  var file=input.files[0];
  if(file.size>10*1024*1024){alert('Image is too large (max 10MB). Please use a smaller image.');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    _uploadedImageData=e.target.result;
    var preview=document.getElementById('imagePreview');
    if(preview){
      preview.innerHTML='<div style="position:relative;display:inline-block"><img src="'+_uploadedImageData+'" style="max-width:300px;max-height:200px;border-radius:var(--r);border:2px solid var(--g)"><button onclick="removeUploadedImage()" style="position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;border:none;background:var(--e);color:#fff;cursor:pointer;font-size:14px;font-weight:700">✕</button></div><div style="font-size:12px;color:var(--g);margin-top:4px">Photo attached — will be checked by AI</div>';
    }
  };
  reader.readAsDataURL(file);
}
function removeUploadedImage(){
  _uploadedImageData=null;
  var preview=document.getElementById('imagePreview');
  if(preview) preview.innerHTML='';
  var f1=document.getElementById('openImage');if(f1)f1.value='';
  var f2=document.getElementById('openCamera');if(f2)f2.value='';
}

// Submit open-answer question for AI checking
async function submitOpenAnswer(){
  var q=CQ.questions[CQ.idx];
  var textAnswer=(document.getElementById('openAnswer')||{}).value||'';
  var hasImage=!!_uploadedImageData;

  if(!textAnswer.trim()&&!hasImage){
    alert('Please type your answer or upload a photo of your work.');return;
  }

  var fb=document.getElementById('fb');
  var nx=document.getElementById('nx');
  fb.innerHTML='<div style="padding:16px;background:var(--pl);border-radius:var(--r);text-align:center"><div style="font-size:14px;font-weight:600;color:var(--p)">Checking your answer...</div><div style="font-size:12px;color:var(--t2);margin-top:4px">AI is reviewing your work</div></div>';

  // Disable submit button
  document.querySelectorAll('.bt.bp').forEach(function(b){b.disabled=true;b.style.opacity='0.5';});

  try{
    var prompt='You are a maths teacher checking a Year 6 student\'s work.\n\nQuestion: '+q.txt+'\nCorrect answer: '+q.answer+'\n';
    if(q.solution) prompt+='Model solution: '+q.solution+'\n';
    prompt+='\nStudent\'s written answer:\n'+textAnswer+'\n';
    if(hasImage) prompt+='\n[The student has also uploaded a photo of their handwritten working.]\n';
    prompt+='\nPlease respond in this exact JSON format:\n{"correct":true/false,"marks_given":X,"out_of":'+((q.marks||3))+',"feedback":"specific feedback on their work","working_feedback":"comments on their method/working shown","next_hint":"one tip to help them improve"}\n\nBe encouraging but honest. If they got the right answer but showed no working, give partial marks. If they showed good working but made a small error, acknowledge the good method.';

    // If AI is available, use it; otherwise do a simple text match
    if(hasAIKey()){
      var response=await callAI(prompt,800);
      var jsonMatch=response.match(/\{[\s\S]*\}/);
      if(jsonMatch){
        var result=JSON.parse(jsonMatch[0]);
        var correct=result.correct;
        var pct=Math.round((result.marks_given/result.out_of)*100);
        if(correct||pct>=70) CQ.score++;
        CQ.answers.push({q:q.id,correct:correct||pct>=70,mode:'open',hasImage:hasImage});

        var s=S[CQ.subject][CQ.topic];
        if(s&&!s.sn.includes(q.id))s.sn.push(q.id);

        var scoreColor=pct>=80?'var(--g)':pct>=50?'var(--w)':'var(--e)';
        fb.innerHTML='<div style="border:2px solid '+scoreColor+';border-radius:var(--r);overflow:hidden;margin-top:12px">'+
          '<div style="background:'+scoreColor+';color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+(correct?'Correct!':'Not quite right')+'</span><span>'+result.marks_given+'/'+result.out_of+' marks</span></div>'+
          '<div style="padding:16px">'+
          '<div style="margin-bottom:10px"><strong style="font-size:13px;color:var(--t2)">Feedback:</strong><div style="font-size:14px;margin-top:4px">'+result.feedback+'</div></div>'+
          (result.working_feedback?'<div style="margin-bottom:10px"><strong style="font-size:13px;color:var(--t2)">Working:</strong><div style="font-size:14px;margin-top:4px">'+result.working_feedback+'</div></div>':'')+
          (result.next_hint?'<div style="background:var(--wl);padding:10px;border-radius:var(--r);font-size:13px"><strong>Tip:</strong> '+result.next_hint+'</div>':'')+
          (hasImage?'<div style="margin-top:8px;font-size:12px;color:var(--v)">📷 Photo was included with submission</div>':'')+
          '</div></div>';
      } else {
        throw new Error('Could not parse AI response');
      }
    } else {
      // Simple fallback: check if the answer contains the correct value
      var correct=textAnswer.toLowerCase().includes(String(q.answer).toLowerCase());
      if(correct) CQ.score++;
      CQ.answers.push({q:q.id,correct:correct,mode:'open',hasImage:hasImage});
      var s=S[CQ.subject][CQ.topic];
      if(s&&!s.sn.includes(q.id))s.sn.push(q.id);
      fb.innerHTML='<div class="fb '+(correct?'ok':'no')+'">'+(correct?'Correct! ':'The correct answer is: '+q.answer+'. ')+q.exp+'</div>';
    }

    var isLast=CQ.idx>=CQ.questions.length-1;
    nx.innerHTML='<button class="bt bp" onclick="'+(isLast?'showQuizResults()':'nextOpenQuestion()')+'">'+(isLast?'See Results':'Next Question')+'</button>';

  }catch(e){
    fb.innerHTML='<div class="fb no">Error checking answer: '+e.message+'. The correct answer is: '+q.answer+'</div>';
    var correct=false;
    CQ.answers.push({q:q.id,correct:false,mode:'open',hasImage:hasImage});
    var isLast=CQ.idx>=CQ.questions.length-1;
    nx.innerHTML='<button class="bt bp" onclick="'+(isLast?'showQuizResults()':'nextOpenQuestion()')+'">'+(isLast?'See Results':'Next Question')+'</button>';
  }

  // Re-enable buttons
  document.querySelectorAll('.bt.bp').forEach(function(b){b.disabled=false;b.style.opacity='1';});
  _uploadedImageData=null;
}

function nextOpenQuestion(){
  _uploadedImageData=null;
  CQ.idx++;
  renderQuizQuestion();
}

function selectOption(idx){
  if(document.querySelector('.ob.ok')||document.querySelector('.ob.no'))return;
  let q=CQ.questions[CQ.idx];
  let btns=document.querySelectorAll('.ob');
  btns.forEach((b,i)=>{
    if(i===q.cor)b.classList.add('ok');
    if(i===idx&&i!==q.cor)b.classList.add('no');
    b.onclick=null;
  });
  let correct=idx===q.cor;
  if(correct)CQ.score++;
  CQ.answers.push({q:q.id,chose:idx,correct:correct});
  // Mark as seen
  let s=S[CQ.subject][CQ.topic];
  if(!s.sn.includes(q.id))s.sn.push(q.id);
  document.getElementById('fb').innerHTML=`<div class="fb ${correct?'ok':'no'}">${correct?'Correct! ':'Not quite. '}${q.exp}</div>`;
  let isLast=CQ.idx>=CQ.questions.length-1;
  document.getElementById('nx').innerHTML=`<button class="bt bp" onclick="${isLast?'showQuizResults()':'nextQuestion()'}">${isLast?'See Results':'Next Question'}</button>`;
}

function nextQuestion(){
  CQ.idx++;
  renderQuizQuestion();
}

function showQuizResults(){
  let pct=Math.round(CQ.score/CQ.questions.length*100);
  let s=S[CQ.subject][CQ.topic];
  s.ok+=CQ.score;
  s.no+=(CQ.questions.length-CQ.score);
  s.h.push({date:new Date().toDateString(),score:CQ.score,total:CQ.questions.length,pct:pct});
  // Adaptive difficulty
  let lvMsg='';
  if(pct>=80&&s.lv<5){s.lv++;lvMsg='Great work! You have moved up to Level '+s.lv+'.';}
  else if(pct<40&&s.lv>1){s.lv--;lvMsg='Let us practise more at Level '+s.lv+' to build confidence.';}
  else{lvMsg='You are staying at Level '+s.lv+'. Keep practising!';}
  S.total++;
  S.done.push({date:new Date().toDateString(),subject:CQ.subject,topic:CQ.topic,score:CQ.score+'/'+CQ.questions.length});
  markActive();sv();
  syncPerformanceToServer();
  let SC=document.getElementById('SC');
  SC.innerHTML=`
  <div class="cd" style="text-align:center">
    <h2>${pct>=80?'Excellent!':pct>=60?'Good effort!':'Keep trying!'}</h2>
    <div style="font-size:48px;font-weight:700;color:${pct>=80?'var(--g)':pct>=60?'var(--w)':'var(--e)'};margin:16px 0">${pct}%</div>
    <div class="ds">You got ${CQ.score} out of ${CQ.questions.length} correct.</div>
    <div style="margin:16px 0;padding:12px;background:var(--pl);border-radius:var(--r);font-size:14px">${lvMsg}</div>
    <div style="margin:16px 0">
      ${CQ.answers.map((a,i)=>{let q=CQ.questions[i];return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)"><span style="color:${a.correct?'var(--g)':'var(--e)'}">${a.correct?'✓':'✗'}</span><span style="font-size:13px">${q.txt.substring(0,60)}${q.txt.length>60?'...':''}</span></div>`;}).join('')}
    </div>
    <button class="bt bp" onclick="startQuiz('${CQ.subject}','${CQ.topic}')" style="margin-right:8px">Try Again</button>
    ${hasAIKey()?`<button class="bt" onclick="generateAI('${CQ.subject}','${CQ.topic}')" style="background:var(--v);color:#fff;margin-right:8px">Generate AI Questions</button>`:''}
    <button class="bt" onclick="startShowYourWork('${CQ.subject}','${CQ.topic}')" style="background:var(--w);color:#fff;margin-right:8px">Show Your Work</button>
    <button class="bt bg" onclick="go('${CQ.subject}')">Back to ${CQ.subject==='english'?'English':'Maths'}</button>
  </div>`;
  CQ.active=false;
  updateHeader();
}

// === READING ENGINE ===
function startReading(subj,topic){
  let s=S[subj][topic];
  let lv=String(s.lv);
  let bank=RQ[lv]||[];
  let unseen=bank.filter(p=>!s.sn.includes(p.id));
  let seen=bank.filter(p=>s.sn.includes(p.id));
  let pool=[...unseen,...seen];
  if(pool.length===0){
    if(hasAIKey()){generateAI(subj,topic);return;}
    alert('No built-in passages for this level. Set up an AI key to unlock more.');return;
  }
  let passage=pool[0];
  CQ={active:true,subject:subj,topic:topic,questions:passage.qs,idx:0,score:0,answers:[],mode:'reading',passage:passage};
  renderReadingQuestion();
}

function renderReadingQuestion(){
  let SC=document.getElementById('SC');
  let p=CQ.passage;
  let q=CQ.questions[CQ.idx];
  SC.innerHTML=`
  <div class="cd">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="qn">Reading Comprehension — Question ${CQ.idx+1} of ${CQ.questions.length}</div>
      <div style="font-size:13px;color:var(--t2)">Score: ${CQ.score}/${CQ.idx}</div>
    </div>
    <div class="pb"><div class="pf" style="width:${(CQ.idx/CQ.questions.length)*100}%"></div></div>
  </div>
  <div class="cd" style="background:#f8fafc;border-left:4px solid var(--v)">
    <h3 style="margin-bottom:12px">Read this passage carefully:</h3>
    <div style="font-size:15px;line-height:1.8">${p.passage}</div>
  </div>
  <div class="qb">
    <div class="qt">${q.q}</div>
    <div id="opts">
      ${q.opts.map((o,i)=>`<button class="ob" onclick="selectReadingOption(${i})">${o}</button>`).join('')}
    </div>
    <div id="fb"></div>
    <div id="nx" style="margin-top:12px"></div>
  </div>`;
}

function selectReadingOption(idx){
  if(document.querySelector('.ob.ok')||document.querySelector('.ob.no'))return;
  let q=CQ.questions[CQ.idx];

  btns.forEach((b,i)=>{
    if(i===q.cor)b.classList.add('ok');

  CQ.answers.push({correct:correct});
  document.getElementById('fb').innerHTML=`<div class="fb ${correct?'ok':'no'}">${correct?'Correct! ':'Not quite. '}${q.exp}</div>`;

  document.getElementById('nx').innerHTML=`<button class="bt bp" onclick="${isLast?'finishReading()':'nextReadingQ()'}">${isLast?'See Results':'Next Question'}</button>`;
}

function nextReadingQ(){CQ.idx++;renderReadingQuestion();}

function finishReading(){
  let s=S[CQ.subject][CQ.topic];
  if(!s.sn.includes(CQ.passage.id))s.sn.push(CQ.passage.id);
  let pct=Math.round(CQ.score/CQ.questions.length*100);
  s.ok+=CQ.score;s.no+=(CQ.questions.length-CQ.score);
  s.h.push({date:new Date().toDateString(),score:CQ.score,total:CQ.questions.length,pct:pct});
  let lvMsg='';
  if(pct>=80&&s.lv<5){s.lv++;lvMsg='Great work! You have moved up to Level '+s.lv+'.';}
  else if(pct<40&&s.lv>1){s.lv--;lvMsg='Let us practise more at Level '+s.lv+'.';}
  else{lvMsg='You are staying at Level '+s.lv+'. Keep going!';}
  S.total++;S.done.push({date:new Date().toDateString(),subject:'english',topic:'reading',score:CQ.score+'/'+CQ.questions.length});
  markActive();sv();syncPerformanceToServer();
  let SC=document.getElementById('SC');
  SC.innerHTML=`
  <div class="cd" style="text-align:center">
    <h2>Reading Complete!</h2>
    <div style="font-size:48px;font-weight:700;color:${pct>=80?'var(--g)':pct>=60?'var(--w)':'var(--e)'};margin:16px 0">${pct}%</div>

}

function openWritingCentre(){
  let SC=document.getElementById('SC');
  let s=S.english.writing;
  let wType=window._writingType||null;
  if(wType){selectWritingType(wType);return;}
  let typeCards=Object.entries(WRITING_TYPES).map(function(entry){
    let key=entry[0],wt=entry[1];
    return '<div class="sc" onclick="selectWritingType(\''+key+'\')" style="border-left:4px solid '+wt.color+'"><div style="font-size:28px;margin-bottom:8px">'+wt.icon+'</div><h3>'+wt.name+'</h3><div class="ds">'+wt.desc+'</div></div>';
  }).join('');
  SC.innerHTML='<div class="cd"><h2>Writing Centre</h2><div class="ds">Choose a type of writing. After you write, AI will read your work and give you detailed feedback like a teacher.</div><div style="margin-top:8px">'+lvBadge(s.lv)+'</div></div><div class="sg">'+typeCards+'</div><div style="margin-top:16px"><button class="bt" style="background:var(--b)" onclick="go(\'english\')">Back to English</button></div>';
}

function selectWritingType(typeKey){
  window._writingType=typeKey;
  let wt=WRITING_TYPES[typeKey];
  let s=S.english.writing;
  let lv=String(s.lv);
  let prompts=wt.prompts[lv]||wt.prompts['3']||wt.prompts['2']||wt.prompts['1']||[];
  let promptCards=prompts.map(function(p){
    let done=s.sn.includes(p.id);

  }).join('');
  let aiCard=hasAIKey()?'<div class="sc" onclick="generateAIWritingPrompt(\''+typeKey+'\')" style="border-left:4px solid var(--w);background:var(--wl)"><h3>AI-Generated Prompt</h3><div class="ds">Get a fresh writing prompt tailored to areas you need to practise</div><span class="badge b3">AI Powered</span></div>':'';

}

function startWritingAssignment(typeKey,promptId){
  let wt=WRITING_TYPES[typeKey];
  let s=S.english.writing;
  let lv=String(s.lv);
  let prompts=wt.prompts[lv]||wt.prompts['3']||wt.prompts['2']||wt.prompts['1']||[];
  let p=prompts.find(function(x){return x.id===promptId;});
  if(!p){alert('Prompt not found.');return;}
  CQ={active:true,subject:'english',topic:'writing',mode:'writing',prompt:p,writingType:typeKey};
  renderWritingScreen();
}

function renderWritingScreen(){
  let SC=document.getElementById('SC');

function submitWritingBasic(){
  let text=document.getElementById('wrText').value.trim();
  if(!text||text.split(/\s+/).length<5){alert('Please write at least 5 words before submitting.');return;}
  let p=CQ.prompt;let s=S.english.writing;
  let words=text.split(/\s+/).length;
  let sentences=(text.match(/[.!?]+/g)||[]).length;
  let startsCapital=/^[A-Z]/.test(text);
  let score=0,feedback=[];
  let minW=p.min||30;
  if(words>=minW){score+=25;feedback.push({ok:true,msg:'Good length! You wrote '+words+' words.'});}
  else{feedback.push({ok:false,msg:'Try to write more. You wrote '+words+' words. Aim for at least '+minW+'.'});}
  if(sentences>=3){score+=25;feedback.push({ok:true,msg:'Good use of sentence endings ('+sentences+' found).'});}
  else{feedback.push({ok:false,msg:'Remember to end every sentence with a full stop, question mark, or exclamation mark.'});}
  if(startsCapital){score+=25;feedback.push({ok:true,msg:'Your writing starts with a capital letter.'});}
  else{feedback.push({ok:false,msg:'Always start your writing with a capital letter.'});}
  if(text.includes('\n')||words>40){score+=25;feedback.push({ok:true,msg:'Good structure!'});}
  else{feedback.push({ok:false,msg:'Try to develop your ideas more. Use paragraphs for longer writing.'});}
  if(!s.sn.includes(p.id))s.sn.push(p.id);
  s.ok+=Math.round(score/25);s.no+=(4-Math.round(score/25));
  s.h.push({date:new Date().toDateString(),score:score,total:100,pct:score});
  S.total++;S.done.push({date:new Date().toDateString(),subject:'english',topic:'writing',score:score+'/100'});
  S.wr.push({date:new Date().toDateString(),title:p.title,type:CQ.writingType,text:text,score:score,feedback:feedback,mode:'basic'});
  if(score>=80&&s.lv<5)s.lv++;else if(score<40&&s.lv>1)s.lv--;
  markActive();sv();syncPerformanceToServer();
  let fbHtml=feedback.map(function(f){return '<div class="fb '+(f.ok?'ok':'no')+'" style="margin-bottom:8px">'+(f.ok?'\u2713':'\u2717')+' '+f.msg+'</div>';}).join('');
  let scoreColor=score>=75?'var(--g)':score>=50?'var(--w)':'var(--e)';
  let SC=document.getElementById('SC');
  SC.innerHTML='<div class="cd" style="text-align:center"><h2>Quick Check Complete</h2><div style="font-size:48px;font-weight:700;color:'+scoreColor+';margin:16px 0">'+score+'/100</div><div class="ds">For detailed teacher-style feedback, use "Submit for AI Feedback" next time.</div></div><div class="cd"><h3>Basic Feedback:</h3>'+fbHtml+'</div><div class="cd"><h3>What you wrote:</h3><div style="background:#f8fafc;padding:16px;border-radius:var(--r);border:1px solid var(--b);white-space:pre-wrap;font-size:14px;line-height:1.8">'+text.replace(/</g,'&lt;')+'</div></div><div style="margin-top:16px;display:flex;gap:8px"><button class="bt bp" onclick="openWritingCentre()">Write Something Else</button><button class="bt bg" onclick="go(\'english\')">Back to English</button></div>';
  CQ.active=false;updateHeader();
}

async function submitWritingToAI(){
  let text=document.getElementById('wrText').value.trim();
  if(!text||text.split(/\s+/).length<5){alert('Please write at least 5 words before submitting.');return;}
  if(!hasAIKey()){alert('To get AI feedback, please set your API key in the Parent Dashboard (Settings tab). You can also use Quick Check for basic feedback.');return;}
  let p=CQ.prompt;let wt=WRITING_TYPES[CQ.writingType];let s=S.english.writing;

  try{

    let match=respText.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('Could not parse AI response.');

    s.h.push({date:new Date().toDateString(),score:sc,total:100,pct:sc});
    S.total++;S.done.push({date:new Date().toDateString(),subject:'english',topic:'writing',score:sc+'/100'});
    S.wr.push({date:new Date().toDateString(),title:p.title,type:CQ.writingType,text:text,score:sc,aiFeedback:fb,mode:'ai'});
    if(sc>=80&&s.lv<5)s.lv++;else if(sc<40&&s.lv>1)s.lv--;
    markActive();sv();syncPerformanceToServer();
    renderAIFeedback(text,fb,CQ.writingType);
  }catch(e){

function renderAIFeedback(originalText,fb,writingType){

async function generateAdaptivePrompt(writingType,focusArea){
  if(!hasAIKey()){alert('Please set your API key in the Parent Dashboard first.');return;}
  let wt=WRITING_TYPES[writingType];let s=S.english.writing;
  let lvNames={1:'beginner (Year 5-6)',2:'intermediate (Year 7-8)',3:'advanced (Year 8-9)'};
  let SC=document.getElementById('SC');
  SC.innerHTML='<div class="cd" style="text-align:center"><h2>Creating a personalised writing exercise...</h2><div class="ds">The AI is designing a '+wt.name.toLowerCase()+' assignment that focuses on: <strong>'+focusArea+'</strong></div><div class="pb"><div class="pf" style="width:50%"></div></div></div>';
  let aiP='Create a writing assignment for a '+lvNames[s.lv]+' student (age 10-11, learns best with clear structured instructions). They need to practise: "'+focusArea+'". Create a '+wt.name+' assignment with clear step-by-step instructions.\nReturn ONLY JSON: {"title":"<title>","inst":"<2-3 sentence instructions>","sc":[{"l":"<step>","h":"<hint>"}],"min":<word count: 30/60/100>,"focus_reminder":"<1-sentence reminder about the skill>"}';
  try{
    let text=await callAI(aiP,1000);
    let match=text.match(/\{[\s\S]*\}/);if(!match)throw new Error('Could not parse response.');
    let newPrompt=JSON.parse(match[0]);newPrompt.id='ai_wp_'+Date.now();
    CQ={active:true,subject:'english',topic:'writing',mode:'writing',prompt:newPrompt,writingType:writingType};
    renderWritingScreen();
    let focusDiv=document.createElement('div');focusDiv.className='cd';focusDiv.style.background='var(--wl)';focusDiv.style.borderLeft='4px solid var(--w)';

  }catch(e){
    SC.innerHTML='<div class="cd"><h2>Could not generate prompt</h2><div class="ds" style="color:var(--e)">'+e.message+'</div><button class="bt bp" onclick="openWritingCentre()" style="margin-top:16px">Back</button></div>';
  }
}

}

function submitFreeWritingBasic(){
  var text=(document.getElementById('freeText')||{}).value||'';
  var title=(document.getElementById('freeTitle')||{}).value||'Untitled Free Writing';
  if(!text.trim()||text.trim().split(/\s+/).length<5){alert('Please write at least 5 words before submitting.');return;}
  var s=S.english.writing;
  var words=text.trim().split(/\s+/).length;
  var sentences=(text.match(/[.!?]+/g)||[]).length;
  var score=0,feedback=[];
  if(words>=30){score+=25;feedback.push({ok:true,msg:'Good length! You wrote '+words+' words.'});}
  else{feedback.push({ok:false,msg:'Try to write more. You wrote '+words+' words. Aim for at least 30.'});}
  if(sentences>=3){score+=25;feedback.push({ok:true,msg:'Good use of sentence endings ('+sentences+' found).'});}
  else{feedback.push({ok:false,msg:'Use full stops, question marks, or exclamation marks to end sentences.'});}
  if(/^[A-Z]/.test(text.trim())){score+=25;feedback.push({ok:true,msg:'Starts with a capital letter.'});}
  else{feedback.push({ok:false,msg:'Always start your writing with a capital letter.'});}
  if(text.includes('\n')||words>40){score+=25;feedback.push({ok:true,msg:'Good structure!'});}
  else{feedback.push({ok:false,msg:'Try to develop your ideas more and use paragraphs.'});}
  s.ok+=Math.round(score/25);s.no+=(4-Math.round(score/25));
  s.h.push({date:new Date().toDateString(),score:score,total:100,pct:score});
  S.total++;S.done.push({date:new Date().toDateString(),subject:'english',topic:'writing',score:score+'/100'});
  S.wr.push({date:new Date().toDateString(),title:title.trim(),type:'free',text:text,score:score,feedback:feedback,mode:'free'});
  if(score>=80&&s.lv<5)s.lv++;
  markActive();sv();syncPerformanceToServer();
  var fbHtml=feedback.map(function(f){return '<div class="fb '+(f.ok?'ok':'no')+'" style="margin-bottom:8px">'+(f.ok?'✓':'✗')+' '+f.msg+'</div>';}).join('');

function startShowYourWork(subj,topic){
  var sywKey=subj+'_'+topic;
  var s=S[subj][topic];
  var lv=String(s.lv);
  var bank=SYW[sywKey]&&SYW[sywKey][lv]?SYW[sywKey][lv]:[];
  if(bank.length===0){
    // Try AI generation if no bank questions
    if(hasAIKey()){generateSYW(subj,topic);return;}
    alert('No show-your-work questions available for this topic and level.');return;
  }
  // Pick a random question
  var q=bank[Math.floor(Math.random()*bank.length)];
  CQ={active:true,subject:subj,topic:topic,mode:'syw',sywQuestion:q,idx:0,score:0,questions:[],answers:[]};
  renderSYWQuestion();
}

async function submitSYW(){
  var answer=document.getElementById('sywAnswer').value.trim();
  if(!answer||answer.length<5){alert('Please write your working and answer before submitting.');return;}
  var btn=document.getElementById('sywSubmitBtn');
  btn.disabled=true;btn.textContent='AI is marking...';
  var q=CQ.sywQuestion;
  var kidName=currentUser&&currentUser.kid?currentUser.kid.name:'Student';
  var asdMode=currentUser&&currentUser.kid&&currentUser.kid.asd;
  
  var prompt='You are a friendly, encouraging maths/English teacher marking a student\'s work. '
    +'The student is '+kidName+', age '+(currentUser.kid?currentUser.kid.age:11)+', Year '+(currentUser.kid?currentUser.kid.year:6)+'. '
    +(asdMode?'The student learns best with clear, structured, and encouraging instructions. Use simple language. ':'')
    +'\n\nQUESTION (worth '+q.marks+' marks):\n'+q.q
    +'\n\nCORRECT ANSWER:\n'+q.answer
    +'\n\nSTUDENT\'S ANSWER:\n'+answer
    +'\n\nPlease respond in this EXACT JSON format (no other text):\n'
    +'{"marks_given":NUMBER,"out_of":'+q.marks+',"correct":BOOLEAN,"method_correct":BOOLEAN,'
    +'"feedback":"Your detailed feedback here - what they did well and what to improve",'
    +'"correction":"If wrong, show the correct working step by step here, otherwise empty string",'
    +'"encouragement":"A short encouraging message"}';
  
  try{
    var result=await callAI(prompt,1200);
    // Parse JSON from response
    var jsonStr=result;
    var jsonMatch=result.match(/\{[\s\S]*\}/);
    if(jsonMatch) jsonStr=jsonMatch[0];
    var fb=JSON.parse(jsonStr);
    
    // Update scores
    var s=S[CQ.subject][CQ.topic];
    if(fb.correct){s.ok++;CQ.score=1;}else{s.no++;}
    S.total++;
    S.done.push({date:new Date().toDateString(),subject:CQ.subject,topic:CQ.topic,score:fb.marks_given+'/'+fb.out_of,mode:'syw'});
    markActive();sv();syncPerformanceToServer();
    
    var pct=Math.round(fb.marks_given/fb.out_of*100);
    var color=pct>=80?'var(--g)':pct>=50?'var(--w)':'var(--e)';
    
    var html='<div style="border:2px solid '+color+';border-radius:var(--r);overflow:hidden">';
    html+='<div style="background:'+color+';color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">';
    html+='<strong style="font-size:16px">'+fb.encouragement+'</strong>';
    html+='<span style="font-size:20px;font-weight:700">'+fb.marks_given+'/'+fb.out_of+'</span></div>';
    html+='<div style="padding:16px">';
    html+='<div style="margin-bottom:12px"><strong>Method:</strong> '+(fb.method_correct?'<span style="color:var(--g)">Correct approach</span>':'<span style="color:var(--e)">Needs improvement</span>')+'</div>';
    html+='<div style="margin-bottom:12px"><strong>Feedback:</strong> '+fb.feedback+'</div>';
    if(fb.correction){
      html+='<div style="padding:12px;background:#fef2f2;border-radius:var(--r);margin-bottom:12px"><strong>Correct working:</strong><br>'+fb.correction.replace(/\n/g,'<br>')+'</div>';
    }
    html+='</div></div>';
    html+='<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">';
    html+='<button class="bt bp" onclick="startShowYourWork(\''+CQ.subject+'\',\''+CQ.topic+'\')">Try Another</button>';
    if(hasAIKey()){html+='<button class="bt" style="background:var(--v);color:#fff" onclick="generateSYW(\''+CQ.subject+'\',\''+CQ.topic+'\')">AI Generated Problem</button>';}
    html+='<button class="bt" style="background:var(--b)" onclick="go(\''+CQ.subject+'\')">Back to '+((CQ.subject==='english')?'English':'Maths')+'</button>';
    html+='</div>';
    
    document.getElementById('sywFeedback').innerHTML=html;
    btn.style.display='none';
  }catch(e){
    btn.disabled=false;btn.textContent='Submit for AI Marking';
    document.getElementById('sywFeedback').innerHTML='<div class="fb no">Error: '+e.message+'. Please try again.</div>';
  }
}

async function generateSYW(subj,topic){
  if(!hasAIKey()){alert('AI features require an API key. Set one up in AI Settings.');return;}
  var SC=document.getElementById('SC');
  var s=S[subj][topic];
  var kidAge=currentUser&&currentUser.kid?currentUser.kid.age:11;
  var kidYear=currentUser&&currentUser.kid?currentUser.kid.year:6;
  var asd=currentUser&&currentUser.kid&&currentUser.kid.asd;
  var lvNames={1:'Year 5-6',2:'Year 6-7',3:'Year 7-8',4:'Year 9-10',5:'Year 10-11'};
  var topicNames={geometry:'Geometry (shapes, area, perimeter, angles, volume)',problemSolving:'Word Problems (multi-step, money, time, ratios)',number:'Number (fractions, decimals, percentages, algebra)',punctuation:'Punctuation and Grammar',reading:'Reading Comprehension',writing:'Writing',biology:'Biology (cells, body systems, ecosystems, genetics)',chemistry:'Chemistry (materials, reactions, atoms, periodic table)',physics:'Physics (forces, energy, electricity, waves)',earthSpace:'Earth and Space (solar system, rocks, weather, climate)',numberAlgebra:'Number & Algebra (IB MYP: whole numbers, exponents, order of operations, algebraic expressions)',fractionDecimal:'Fractions & Decimals (IB MYP: operations, conversions, ordering)',percentage:'Percentages (IB MYP: conversions, increase/decrease, profit/loss)',equations:'Equations (IB MYP: solving, inverse operations, word problems)',geometry7:'Geometry (IB MYP: polygons, angles, transformations, coordinates)',measurement:'Measurement (IB MYP: area, volume, capacity, mass)',statistics:'Statistics (IB MYP: data, stem-leaf, mean/median/mode)',probability:'Probability (IB MYP: theoretical, experimental, sample space)'};

  SC.innerHTML='<div class="cd" style="text-align:center;padding:40px"><div class="ld"></div><div style="margin-top:16px">AI is creating a problem for you...</div></div>';

  var prompt='Create ONE challenging show-your-work problem for a '+kidAge+'-year-old student in Year '+kidYear+'. '
    +(asd?'Student learns best with clear, structured instructions. ':'')
    +'Topic: '+subj+' > '+(topicNames[topic]||topic)+'. Difficulty: '+lvNames[s.lv]+'. '
    +'The problem should require multi-step working. '
    +'Respond in EXACT JSON format (no other text): '
    +'{"q":"The full question text","hint":"A helpful hint","answer":"The full correct working and answer","marks":NUMBER_3_to_5}';
  
  try{
    var result=await callAI(prompt,800);
    var jsonMatch=result.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('Invalid AI response');
    var q=JSON.parse(jsonMatch[0]);
    q.id='ai_syw_'+Date.now();
    CQ={active:true,subject:subj,topic:topic,mode:'syw',sywQuestion:q,idx:0,score:0,questions:[],answers:[]};
    renderSYWQuestion();
  }catch(e){
    SC.innerHTML='<div class="cd"><div class="fb no">Failed to generate question: '+e.message+'</div><button class="bt bp" onclick="go(\''+subj+'\')">Go Back</button></div>';
  }
}

function doEditKid(idx){
  let k=DB.kids[idx];
  if(!k)return;
  let name=document.getElementById('editName').value.trim();
  let user=document.getElementById('editUser').value.trim().toLowerCase();
  let age=parseInt(document.getElementById('editAge').value)||11;
  let year=parseInt(document.getElementById('editYear').value)||6;
  let asd=document.getElementById('editAsd').value==='true';
  let color=document.getElementById('editColor').value||k.avatarColor;
  let err=document.getElementById('editErr');

  if(!name||!user){err.textContent='Name and username are required.';return;}
  if(user==='admin'){err.textContent='Username "admin" is reserved.';return;}
  let dup=DB.kids.find(function(kk,i){return i!==idx&&kk.username.toLowerCase()===user;});
  if(dup){err.textContent='Username "'+user+'" is already taken.';return;}

  k.name=name;k.username=user;k.age=age;k.year=year;k.asd=asd;k.avatarColor=color;

  // Update levels
  let subjects={english:['punctuation','reading','writing'],maths:['geometry','problemSolving','number']};
  for(let subj in subjects){
    subjects[subj].forEach(function(topic){
      let sel=document.getElementById('lv_'+subj+'_'+topic);
      if(sel) k.progress[subj][topic].lv=parseInt(sel.value)||1;
    });
  }

  saveDB(DB);
  adminTab('students');
}

function resetKidPassword(idx){

  let newPass=prompt('Enter new password for '+k.name+':');

  k.password=newPass;
  saveDB(DB);
  alert('Password updated for '+k.name+'.');

function deleteKid(idx){
  let k=DB.kids[idx];
  if(!k)return;
  if(!confirm('Delete student "'+k.name+'"? This will remove ALL their progress permanently. This cannot be undone.'))return;
  DB.kids.splice(idx,1);

function renderKidProgress(){
  let sel=document.getElementById('progressKid');
  let detail=document.getElementById('progressDetail');
  if(!sel||!detail)return;

  if(sel.value==='all'){
    // Overview of all kids
    let rows=DB.kids.map(function(k){
      let p=k.progress;
      let totalRight=0,totalWrong=0;
      ['english','maths'].forEach(function(subj){
        Object.keys(p[subj]).forEach(function(t){totalRight+=p[subj][t].ok;totalWrong+=p[subj][t].no;});
      });
      let pct=totalRight+totalWrong>0?Math.round(totalRight/(totalRight+totalWrong)*100):0;
      let writings=p.wr?p.wr.length:0;
      return '<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="kid-avatar" style="background:'+k.avatarColor+';width:32px;height:32px;font-size:14px">'+k.name.charAt(0)+'</div>'+k.name+'</div></td><td>'+p.streak+'</td><td>'+p.total+'</td><td>'+pct+'%</td><td>'+writings+'</td><td>'+(p.lastDate||'Never')+'</td></tr>';
    }).join('');
    detail.innerHTML='<div class="cd"><table class="tb"><tr><th>Student</th><th>Streak</th><th>Completed</th><th>Accuracy</th><th>Writings</th><th>Last Active</th></tr>'+rows+'</table></div>';
    return;
  }

  // Individual kid detail
  let idx=parseInt(sel.value);
  let k=DB.kids[idx];
  if(!k){detail.innerHTML='';return;}
  let p=k.progress;

  // Check view mode
  if(window._progressView==='adaptive'){
    detail.innerHTML=renderAdaptiveParentDash(p,k.name);
    return;
  }

  // Classic view
  let lvBadgeF=function(lv){let labels=['','Beginner','Intermediate','Advanced','Expert','Master'];let cls=['','b2','b3','b1','b3','b3'];return '<span class="badge '+(cls[lv]||'b2')+'">Level '+lv+' - '+(labels[lv]||'Unknown')+'</span>';};
  let pctBarF=function(ok,no){let t=ok+no;let pct=t>0?Math.round(ok/t*100):0;return '<div class="pb"><div class="pf" style="width:'+pct+'%"></div></div><div style="font-size:12px;color:var(--t2)">'+ok+' correct, '+no+' incorrect ('+pct+'%)</div>';};

  let subjects={english:{punctuation:'Punctuation',reading:'Reading Comprehension',writing:'Writing'},maths:{geometry:'Geometry',problemSolving:'Problem Solving',number:'Number'},science:{biology:'Biology',chemistry:'Chemistry',physics:'Physics',earthSpace:'Earth & Space'},ib7:{numberAlgebra:'Number & Algebra',fractionDecimal:'Fractions & Decimals',percentage:'Percentage',equations:'Equations',geometry7:'Geometry',measurement:'Measurement',statistics:'Statistics',probability:'Probability'}};
  let html='';
  for(let subj in subjects){
    html+='<div class="cd"><h3>'+subj.charAt(0).toUpperCase()+subj.slice(1)+'</h3>';
    for(let topic in subjects[subj]){
      let d=p[subj][topic];
      if(!d) continue;
      html+='<div style="margin-bottom:16px"><strong>'+subjects[subj][topic]+'</strong> '+lvBadgeF(d.lv)+pctBarF(d.ok,d.no);
      if(d.h&&d.h.length>0){
        html+='<div style="margin-top:8px;font-size:13px"><strong>Recent:</strong> '+d.h.slice(-3).map(function(h){return h.date+': '+h.score+'/'+h.total;}).join(' | ')+'</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }

  // Writing submissions
  if(p.wr&&p.wr.length>0){
    html+='<div class="cd"><h3>Writing Submissions ('+p.wr.length+')</h3>';
    p.wr.slice().reverse().slice(0,5).forEach(function(w){
      let modeLabel=w.mode==='ai'?'<span class="badge b3">AI Reviewed</span>':'<span class="badge b2">Quick Check</span>';
      let scoreColor=w.score>=75?'b1':w.score>=50?'b2':'b3';
      html+='<div style="padding:12px;background:#f8fafc;border-radius:var(--r);margin-bottom:8px;border:1px solid var(--b)"><div style="display:flex;justify-content:space-between;align-items:center"><strong>'+w.title+'</strong> <span class="badge '+scoreColor+'">'+w.score+'/100</span></div><div style="font-size:12px;color:var(--t2);margin-top:4px">'+w.date+' | '+(w.type||'Writing')+' '+modeLabel+'</div>';
      if(w.mode==='ai'&&w.aiFeedback&&w.aiFeedback.next_focus){
        html+='<div style="font-size:12px;margin-top:4px;color:var(--w)">Next focus: '+w.aiFeedback.next_focus+'</div>';
      }
      html+='</div>';
    });
    html+='</div>';
  }

  detail.innerHTML=html;
}

function resetAllData(){
  if(confirm('Delete ALL data including student accounts and progress?')){
    localStorage.removeItem(DB_KEY);
    location.reload();
  }
}

function changeAdminPassword(){
  var p1=document.getElementById('newAdminPass').value;
  var p2=document.getElementById('confirmAdminPass').value;
  if(p1.length<4){alert('Password must be at least 4 characters');return;}
  if(p1!==p2){alert('Passwords do not match');return;}
  DB.admin.password=p1;saveDB(DB);
  alert('Admin password updated');
  document.getElementById('newAdminPass').value='';
  document.getElementById('confirmAdminPass').value='';
}

function importData(input){
  var file=input.files[0];
  if(!file){return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(!imported.admin||!imported.kids){alert('Invalid backup file. Must be a Learning Portal JSON export.');return;}
      var msg='This will replace ALL current data with the imported data.\n\n';
      msg+='Imported file contains:\n';
      msg+='- '+imported.kids.length+' student account(s)\n';
      msg+='- Admin password will be updated\n';
      msg+='- API keys will be imported\n\n';
      msg+='Current data will be lost. Continue?';
      if(!confirm(msg)){input.value='';return;}
      DB=imported;
      saveDB(DB);
      alert('Data imported successfully! The page will now reload.');
      location.reload();
    }catch(err){
      alert('Error reading file: '+err.message);
    }
  };
  reader.readAsText(file);
  input.value='';
}

function exportData(){
  var data=JSON.stringify(DB,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='learning-portal-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function startCompQuiz(topic){
  var banks={logic:COMP_LOGIC,number:COMP_NUMBER,geometry:COMP_GEOMETRY,combi:COMP_COMBI};
  var qs=banks[topic];
  if(!qs||qs.length===0){alert('No questions available.');return;}
  if(!S.comp)S.comp={logic:{lv:1,ok:0,no:0},number:{lv:1,ok:0,no:0},geometry:{lv:1,ok:0,no:0},combi:{lv:1,ok:0,no:0}};
  if(!S.comp[topic])S.comp[topic]={lv:1,ok:0,no:0};
  var pool=qs.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  pool=pool.slice(0,5);
  CQ={active:true,subject:'comp',topic:topic,questions:pool,idx:0,score:0,answers:[],mode:'mc'};
  renderQuizQuestion();
}

// Syncs student performance to the server so email agents can read it
function syncPerformanceToServer(){
  if(!isHosted()||!currentUser||currentUser.role!=='kid') return;
  var kid=currentUser.kid;
  var analysis=analyzePerformance(S);
  if(!analysis) return;

  // Build a compact performance summary for the server
  var topicLevels={};
  var topicAccuracy={};
  ['english','maths','science','ib7'].forEach(function(subj){
    if(!S[subj]) return;
    Object.keys(S[subj]).forEach(function(topic){
      var d=S[subj][topic];
      if(!d) return;
      var key=subj+'.'+topic;
      topicLevels[key]=d.lv||1;
      var total=(d.ok||0)+(d.no||0);
      topicAccuracy[key]={ok:d.ok||0,no:d.no||0,accuracy:total>0?Math.round(d.ok/total*100):null,level:d.lv||1};
    });
  });

  // Competition prep levels
  if(S.comp){
    Object.keys(S.comp).forEach(function(t){
      topicLevels['comp.'+t]=S.comp[t].lv||1;
      var total=(S.comp[t].ok||0)+(S.comp[t].no||0);
      topicAccuracy['comp.'+t]={ok:S.comp[t].ok||0,no:S.comp[t].no||0,accuracy:total>0?Math.round(S.comp[t].ok/total*100):null,level:S.comp[t].lv||1};
    });
  }

  // Recent quiz history (last 10)
  var recentQuizzes=[];
  ['english','maths','science','ib7'].forEach(function(subj){
    if(!S[subj]) return;
    Object.keys(S[subj]).forEach(function(topic){
      var d=S[subj][topic];
      if(d&&d.h){
        d.h.forEach(function(h){
          recentQuizzes.push({date:h.date,subject:subj,topic:topic,score:h.score,total:h.total,pct:h.pct});
        });
      }
    });
  });
  recentQuizzes.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  var payload={
    username:kid.username,
    name:kid.name,
    year:kid.year||6,
    overallAccuracy:analysis.overallAccuracy,
    totalCompleted:analysis.totalCompleted,
    streak:analysis.streak,
    daysActive7:analysis.daysActive7,
    daysActive30:analysis.daysActive30,
    topicLevels:topicLevels,
    topicAccuracy:topicAccuracy,
    weakAreas:analysis.weakAreas.map(function(w){return {subject:w.subject,topic:w.topic,accuracy:w.accuracy,level:w.level};}),
    strongAreas:analysis.strongAreas.map(function(s){return {subject:s.subject,topic:s.topic,accuracy:s.accuracy,level:s.level};}),
    recentQuizzes:recentQuizzes.slice(0,10),
    trend:analysis.trend,
    last5Avg:analysis.last5Avg,
    writings:analysis.writings,
    lastSyncDate:new Date().toISOString()
  };

  // Send to server (fire and forget — don't block the UI)
  fetch('/api/performance',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(function(r){
    if(r.ok) console.log('Performance synced to server');
  }).catch(function(e){
    console.log('Performance sync failed (non-critical):',e.message);
  });
}

// Analyze a student's performance across all subjects
function analyzePerformance(progress){
  if(!progress) return null;
  var subjects=['english','maths','science','ib7'];
  var allTopics=[];
  var totalOk=0, totalNo=0;
  var recentSessions=[];
  var weakAreas=[];
  var strongAreas=[];
  var topicAccuracy={};

  subjects.forEach(function(subj){
    if(!progress[subj]) return;
    Object.keys(progress[subj]).forEach(function(topic){
      var d=progress[subj][topic];
      if(!d) return;
      var ok=d.ok||0, no=d.no||0, total=ok+no;
      var acc=total>0?Math.round(ok/total*100):null;
      var key=subj+'_'+topic;
      topicAccuracy[key]={subject:subj,topic:topic,ok:ok,no:no,accuracy:acc,level:d.lv||1,total:total};
      totalOk+=ok; totalNo+=no;
      if(total>=3){
        allTopics.push(topicAccuracy[key]);
        if(acc<50) weakAreas.push(topicAccuracy[key]);
        else if(acc>=80) strongAreas.push(topicAccuracy[key]);
      }
      // Gather history
      if(d.h){
        d.h.forEach(function(h){
          recentSessions.push({date:h.date,subject:subj,topic:topic,score:h.score,total:h.total,pct:h.pct});
        });
      }
    });
  });

  // Sort weak areas by accuracy (worst first)
  weakAreas.sort(function(a,b){return (a.accuracy||0)-(b.accuracy||0);});
  strongAreas.sort(function(a,b){return (b.accuracy||0)-(a.accuracy||0);});

  // Sort recent sessions by date (newest first)
  recentSessions.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  // Calculate trends (last 5 vs previous 5)
  var last5=recentSessions.slice(0,5);
  var prev5=recentSessions.slice(5,10);
  var last5Avg=last5.length>0?Math.round(last5.reduce(function(s,r){return s+(r.pct||0);},0)/last5.length):null;
  var prev5Avg=prev5.length>0?Math.round(prev5.reduce(function(s,r){return s+(r.pct||0);},0)/prev5.length):null;
  var trend=last5Avg!==null&&prev5Avg!==null?last5Avg-prev5Avg:null;

  // Activity heatmap (last 30 days)
  var activityDays={};
  var today=new Date();
  recentSessions.forEach(function(s){
    var key=s.date;
    if(!activityDays[key]) activityDays[key]={count:0,totalPct:0};
    activityDays[key].count++;
    activityDays[key].totalPct+=(s.pct||0);
  });

  // Days active in last 7 and 30 days
  var d7=0,d30=0;
  for(var key in activityDays){
    var diff=Math.floor((today-new Date(key))/(86400000));
    if(diff<=7) d7++;
    if(diff<=30) d30++;
  }

  // Overall accuracy
  var overallAcc=totalOk+totalNo>0?Math.round(totalOk/(totalOk+totalNo)*100):0;

  return {
    overallAccuracy:overallAcc,
    totalCorrect:totalOk,
    totalIncorrect:totalNo,
    totalAttempted:totalOk+totalNo,
    weakAreas:weakAreas.slice(0,5),
    strongAreas:strongAreas.slice(0,3),
    allTopics:allTopics,
    topicAccuracy:topicAccuracy,
    recentSessions:recentSessions.slice(0,20),
    trend:trend,
    last5Avg:last5Avg,
    prev5Avg:prev5Avg,
    daysActive7:d7,
    daysActive30:d30,
    activityDays:activityDays,
    streak:progress.streak||0,
    totalCompleted:progress.total||0,
    writings:progress.wr?progress.wr.length:0
  };
}

// Get smart recommendations based on performance analysis
function getRecommendations(analysis){
  if(!analysis) return [];
  var recs=[];
  var topicNames={punctuation:'Punctuation',reading:'Reading',writing:'Writing',geometry:'Geometry',problemSolving:'Problem Solving',number:'Number',biology:'Biology',chemistry:'Chemistry',physics:'Physics',earthSpace:'Earth & Space',wholeNumbers:'Whole Numbers',numberProperties:'Number Properties',linesAngles:'Lines & Angles',numberStrategies:'Number Strategies',posNegNumbers:'Positive & Negative Numbers',fractions:'Fractions',decimals:'Decimals',algebra:'Algebra',percentage:'Percentage',equations:'Equations',polygons:'Polygons',measurementArea:'Measurement & Area',solids:'Solids',volumeMass:'Volume & Mass',coordGeometry:'Coordinate Geometry',ratioRates:'Ratio & Rates',probability:'Probability',statistics:'Statistics',transformations:'Transformations'};

  // Weak area recommendations
  if(analysis.weakAreas.length>0){
    var w=analysis.weakAreas[0];
    recs.push({type:'focus',icon:'🎯',title:'Focus Area: '+(topicNames[w.topic]||w.topic),desc:'Your accuracy is '+w.accuracy+'% in '+w.subject+' → '+(topicNames[w.topic]||w.topic)+'. Try 3 more practice sessions to improve.',action:"startQuiz('"+w.subject+"','"+w.topic+"')",btnText:'Practice Now'});
  }

  // Trend-based recommendations
  if(analysis.trend!==null){
    if(analysis.trend>10){
      recs.push({type:'positive',icon:'📈',title:'Great Improvement!',desc:'Your recent scores are '+analysis.trend+'% higher than before. Keep going!',action:null,btnText:null});
    } else if(analysis.trend<-10){
      recs.push({type:'warning',icon:'📉',title:'Scores Dipping',desc:'Recent scores dropped by '+Math.abs(analysis.trend)+'%. Consider reviewing topics at a slower pace.',action:null,btnText:null});
    }
  }

  // Consistency recommendations
  if(analysis.daysActive7<3){
    recs.push({type:'consistency',icon:'📅',title:'Stay Consistent',desc:'You were active '+analysis.daysActive7+' days this week. Try to practice at least 4 days per week for best results.',action:null,btnText:null});
  }

  // Level-up opportunities
  analysis.allTopics.forEach(function(t){
    if(t.accuracy>=85&&t.level<5&&t.total>=10){
      recs.push({type:'levelup',icon:'⬆️',title:'Ready to Level Up: '+(topicNames[t.topic]||t.topic),desc:t.accuracy+'% accuracy with '+t.total+' questions attempted. Try harder questions!',action:"startQuiz('"+t.subject+"','"+t.topic+"')",btnText:'Challenge Me'});
    }
  });

  // Untried topics
  var subjects={english:['punctuation','reading','writing'],maths:['geometry','problemSolving','number'],science:['biology','chemistry','physics','earthSpace']};
  for(var subj in subjects){
    subjects[subj].forEach(function(topic){
      var key=subj+'_'+topic;
      var ta=analysis.topicAccuracy[key];
      if(!ta||ta.total===0){
        recs.push({type:'explore',icon:'🔍',title:'Try: '+(topicNames[topic]||topic),desc:'You haven\'t explored '+subj+' → '+(topicNames[topic]||topic)+' yet. Give it a try!',action:"startQuiz('"+subj+"','"+topic+"')",btnText:'Start'});
      }
    });
  }

  return recs.slice(0,6);
}
