<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Portal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a2a3a;line-height:1.6;min-height:100vh}
:root{--p:#4361ee;--pl:#e8edff;--g:#10b981;--gl:#d1fae5;--w:#f59e0b;--wl:#fef3c7;--e:#ef4444;--el:#fee2e2;--v:#8b5cf6;--vl:#ede9fe;--pk:#ec4899;--pkl:#fce7f3;--c:#fff;--t:#1a2a3a;--t2:#64748b;--b:#e2e8f0;--r:12px;--s:0 2px 8px rgba(0,0,0,.08);--s2:0 4px 20px rgba(0,0,0,.12)}
.app{max-width:900px;margin:0 auto;padding:20px}
.hdr{background:linear-gradient(135deg,var(--p),var(--v));color:#fff;padding:24px 28px;border-radius:var(--r);margin-bottom:20px;box-shadow:var(--s2)}
.hdr h1{font-size:24px;font-weight:700}.hdr .sub{opacity:.85;font-size:14px;margin-top:4px}
.hdr .sts{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500}
.nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.nb{padding:10px 20px;border:2px solid var(--b);background:var(--c);border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.nb:hover{border-color:var(--p);color:var(--p)}.nb.on{background:var(--p);color:#fff;border-color:var(--p)}
.cd{background:var(--c);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--s);border:1px solid var(--b)}
.cd h2{font-size:18px;margin-bottom:4px}.cd h3{font-size:16px;margin-bottom:8px;color:var(--p)}.cd .ds{color:var(--t2);font-size:14px;margin-bottom:16px}
.qb{background:#f8fafc;border:1px solid var(--b);border-radius:var(--r);padding:20px;margin-bottom:16px}
.qb .qn{font-size:12px;font-weight:700;color:var(--p);text-transform:uppercase;margin-bottom:4px}
.qb .qt{font-size:16px;font-weight:600;margin-bottom:16px}
.ob{display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border:2px solid var(--b);background:var(--c);border-radius:var(--r);font-size:14px;cursor:pointer;transition:.2s;font-family:inherit}
.ob:hover{border-color:var(--p);background:var(--pl)}.ob.sel{border-color:var(--p);background:var(--pl)}
.ob.ok{border-color:var(--g);background:var(--gl)}.ob.no{border-color:var(--e);background:var(--el)}
.bt{padding:10px 24px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.bp{background:var(--p);color:#fff}.bp:hover{opacity:.9}
.bg{background:var(--g);color:#fff}.bg:hover{opacity:.9}
.fb{padding:16px;border-radius:var(--r);margin-top:12px;font-size:14px}
.fb.ok{background:var(--gl);border:1px solid var(--g);color:#065f46}
.fb.no{background:var(--el);border:1px solid var(--e);color:#991b1b}
.pb{background:var(--b);border-radius:8px;height:12px;overflow:hidden;margin:8px 0}
.pf{height:100%;border-radius:8px;transition:width .5s;background:linear-gradient(90deg,var(--p),var(--v))}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge.b1{background:var(--gl);color:#065f46}.badge.b2{background:var(--wl);color:#92400e}.badge.b3{background:var(--vl);color:#5b21b6}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-top:16px}
.sc{padding:20px;border-radius:var(--r);cursor:pointer;transition:.2s;border:2px solid var(--b);background:var(--c)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--s2);border-color:var(--p)}
.sc h3{font-size:16px;margin-bottom:4px}.sc .ds{font-size:13px;color:var(--t2);margin-bottom:12px}
.tg{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tg button{padding:6px 16px;border:2px solid var(--b);background:var(--c);border-radius:20px;font-size:13px;cursor:pointer;font-weight:500;transition:.2s;font-family:inherit}
.tg button:hover{border-color:var(--p)}.tg button.on{background:var(--p);color:#fff;border-color:var(--p)}
.wr{width:100%;min-height:200px;padding:16px;border:2px solid var(--b);border-radius:var(--r);font-size:15px;font-family:inherit;line-height:1.8;resize:vertical}
.wr:focus{outline:none;border-color:var(--p)}
.wsc{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.wsp{background:var(--pl);padding:16px;border-radius:var(--r);border-left:4px solid var(--p)}
.wsp .wsl{font-size:12px;font-weight:700;color:var(--p);text-transform:uppercase;margin-bottom:4px}
.tb{width:100%;border-collapse:collapse;margin:16px 0}
.tb th,.tb td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--b);font-size:14px}
.tb th{background:#f8fafc;font-weight:600;color:var(--t2)}
.tb tr:hover{background:#f8fafc}
.api{width:100%;padding:10px 14px;border:2px solid var(--b);border-radius:var(--r);font-size:14px;font-family:inherit}
.api:focus{outline:none;border-color:var(--p)}
.db{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px}
.db .lb{font-weight:600}.dd{display:flex;gap:4px}
.dt2{width:12px;height:12px;border-radius:50%;background:var(--b)}.dt2.on{background:var(--p)}
.rp{background:var(--pl);padding:12px;border-radius:var(--r);margin-bottom:8px;font-size:13px}
.lk{color:var(--p);text-decoration:none;font-weight:500}.lk:hover{text-decoration:underline}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.res-card{background:var(--c);border-radius:var(--r);padding:20px;border:1px solid var(--b);box-shadow:var(--s)}
.res-card h4{font-size:15px;margin-bottom:6px}.res-card .ds{font-size:13px;color:var(--t2);margin-bottom:12px}
.res-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-right:4px}
.empty{text-align:center;padding:40px 20px;color:var(--t2)}
.empty svg{width:60px;height:60px;margin-bottom:16px;opacity:.5}

/* Login & Auth styles */
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--c);border-radius:16px;padding:40px;box-shadow:var(--s2);border:1px solid var(--b);width:100%;max-width:440px}
.login-box h2{text-align:center;font-size:22px;margin-bottom:8px}
.login-box .sub{text-align:center;color:var(--t2);font-size:14px;margin-bottom:24px}
.login-box .logo{text-align:center;font-size:48px;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--t2)}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:2px solid var(--b);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--c)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--p)}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.login-btn.primary{background:var(--p);color:#fff}.login-btn.primary:hover{opacity:.9}
.login-btn.secondary{background:var(--b);color:var(--t);margin-top:8px}.login-btn.secondary:hover{background:#d1d5db}
.login-err{color:var(--e);font-size:13px;text-align:center;margin-top:12px;min-height:20px}
.kid-card{display:flex;align-items:center;gap:16px;padding:16px;border:2px solid var(--b);border-radius:var(--r);margin-bottom:12px;cursor:default;transition:.2s;background:var(--c)}
.kid-card:hover{border-color:var(--p);box-shadow:var(--s)}
.kid-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.kid-info{flex:1}.kid-info h4{font-size:15px;margin-bottom:2px}.kid-info .meta{font-size:12px;color:var(--t2)}
.kid-actions{display:flex;gap:6px;flex-shrink:0}
.kid-actions button{padding:6px 12px;border:1px solid var(--b);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;background:var(--c)}
.kid-actions button:hover{border-color:var(--p);color:var(--p)}
.kid-actions button.danger{color:var(--e);border-color:var(--el)}.kid-actions button.danger:hover{background:var(--el)}
select.api{appearance:auto;background:var(--c);cursor:pointer}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.top-bar .user-badge{font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px}
.logout-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit}
.logout-btn:hover{background:rgba(255,255,255,.35)}

</style>
</head>
<body>
<div class="app" id="APP"></div>
<script>

// =============================================
// === MULTI-USER AUTH SYSTEM ==================
// =============================================
const DB_KEY='learning_portal_db';
const AVATAR_COLORS=['#4361ee','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#14b8a6','#6366f1'];

function defaultKidProgress(){
  return {streak:0,lastDate:null,total:0,
    english:{punctuation:{lv:1,ok:0,no:0,h:[],sn:[]},writing:{lv:1,ok:0,no:0,h:[],sn:[]},reading:{lv:1,ok:0,no:0,h:[],sn:[]}},
    maths:{geometry:{lv:1,ok:0,no:0,h:[],sn:[]},problemSolving:{lv:1,ok:0,no:0,h:[],sn:[]},number:{lv:1,ok:0,no:0,h:[],sn:[]}},
    ib7:{wholeNumbers:{lv:1,ok:0,no:0,h:[],sn:[]},numberProperties:{lv:1,ok:0,no:0,h:[],sn:[]},linesAngles:{lv:1,ok:0,no:0,h:[],sn:[]},numberStrategies:{lv:1,ok:0,no:0,h:[],sn:[]},posNegNumbers:{lv:1,ok:0,no:0,h:[],sn:[]},fractions:{lv:1,ok:0,no:0,h:[],sn:[]},decimals:{lv:1,ok:0,no:0,h:[],sn:[]},algebra:{lv:1,ok:0,no:0,h:[],sn:[]},percentage:{lv:1,ok:0,no:0,h:[],sn:[]},equations:{lv:1,ok:0,no:0,h:[],sn:[]},polygons:{lv:1,ok:0,no:0,h:[],sn:[]},measurementArea:{lv:1,ok:0,no:0,h:[],sn:[]},solids:{lv:1,ok:0,no:0,h:[],sn:[]},volumeMass:{lv:1,ok:0,no:0,h:[],sn:[]},coordGeometry:{lv:1,ok:0,no:0,h:[],sn:[]},ratioRates:{lv:1,ok:0,no:0,h:[],sn:[]},probability:{lv:1,ok:0,no:0,h:[],sn:[]},statistics:{lv:1,ok:0,no:0,h:[],sn:[]},transformations:{lv:1,ok:0,no:0,h:[],sn:[]}},
    science:{biology:{lv:1,ok:0,no:0,h:[],sn:[]},chemistry:{lv:1,ok:0,no:0,h:[],sn:[]},physics:{lv:1,ok:0,no:0,h:[],sn:[]},earthSpace:{lv:1,ok:0,no:0,h:[],sn:[]}},
    done:[],wr:[],aiQ:{},comp:{logic:{lv:1,ok:0,no:0},number:{lv:1,ok:0,no:0},geometry:{lv:1,ok:0,no:0},combi:{lv:1,ok:0,no:0}}};
}

function defaultDB(){
  return {
    admin:{username:'admin',password:'admin123'},
    settings:{provider:'claude',model:'claude-opus-4-6',key:'',geminiKey:''},
    kids:[]
  };
}

function loadDB(){
  try{let s=localStorage.getItem(DB_KEY);if(s)return JSON.parse(s);}catch(e){}
  return null;
}
function saveDB(db){try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}}

// Migrate old single-user data if exists
function migrateOldData(){
  let db=loadDB();
  if(db) return db;
  db=defaultDB();
  // Check for old riyansh_v5 data
  try{
    let old=localStorage.getItem('riyansh_v5');
    if(old){
      let p=JSON.parse(old);
      // Create Riyansh as first kid from old data
      let kid={
        id:'kid_'+Date.now(),
        username:'riyansh',
        password:'learn123',
        name:'Riyansh',
        age:11,
        year:6,
        asd:true,
        avatarColor:AVATAR_COLORS[0],
        progress:defaultKidProgress()
      };
      // Copy over old progress
      if(p.english) kid.progress.english=p.english;
      if(p.maths) kid.progress.maths=p.maths;
      if(p.done) kid.progress.done=p.done;
      if(p.wr) kid.progress.wr=p.wr;
      if(p.aiQ) kid.progress.aiQ=p.aiQ;
      if(p.streak) kid.progress.streak=p.streak;
      if(p.lastDate) kid.progress.lastDate=p.lastDate;
      if(p.total) kid.progress.total=p.total;
      // Ensure science progress exists (migration for accounts created before science was added)
      if(!kid.progress.science) kid.progress.science={biology:{lv:1,ok:0,no:0,h:[],sn:[]},chemistry:{lv:1,ok:0,no:0,h:[],sn:[]},physics:{lv:1,ok:0,no:0,h:[],sn:[]},earthSpace:{lv:1,ok:0,no:0,h:[],sn:[]}};
      // Ensure all sub-topics have sn arrays
      ['english','maths','science'].forEach(s=>{if(kid.progress[s])Object.keys(kid.progress[s]).forEach(t=>{
        if(!kid.progress[s][t].sn) kid.progress[s][t].sn=[];
      });});
      if(!kid.progress.aiQ) kid.progress.aiQ={};
      kid.progress.wr=kid.progress.wr||[];
      db.kids.push(kid);
      // Copy API keys
      if(p.key) db.settings.key=p.key;
      if(p.geminiKey) db.settings.geminiKey=p.geminiKey;
      if(p.provider) db.settings.provider=p.provider;
      if(p.model) db.settings.model=p.model;
    }
  }catch(e){}
  saveDB(db);
  return db;
}

let DB=migrateOldData();
// Fix deprecated model IDs
if(DB.settings.model==='claude-sonnet-4-20250514'||DB.settings.model==='claude-sonnet-4-6'){DB.settings.model='claude-opus-4-6';saveDB(DB);}
// Migrate all kids: ensure science progress exists (for accounts created before science was added)
(function(){let changed=false;DB.kids.forEach(function(k){
  if(!k.progress.science){k.progress.science={biology:{lv:1,ok:0,no:0,h:[],sn:[]},chemistry:{lv:1,ok:0,no:0,h:[],sn:[]},physics:{lv:1,ok:0,no:0,h:[],sn:[]},earthSpace:{lv:1,ok:0,no:0,h:[],sn:[]}};changed=true;}
  ['biology','chemistry','physics','earthSpace'].forEach(function(t){if(!k.progress.science[t])k.progress.science[t]={lv:1,ok:0,no:0,h:[],sn:[]};if(!k.progress.science[t].sn)k.progress.science[t].sn=[];changed=true;});
  if(!k.progress.ib7||!k.progress.ib7.wholeNumbers){k.progress.ib7={wholeNumbers:{lv:1,ok:0,no:0,h:[],sn:[]},numberProperties:{lv:1,ok:0,no:0,h:[],sn:[]},linesAngles:{lv:1,ok:0,no:0,h:[],sn:[]},numberStrategies:{lv:1,ok:0,no:0,h:[],sn:[]},posNegNumbers:{lv:1,ok:0,no:0,h:[],sn:[]},fractions:{lv:1,ok:0,no:0,h:[],sn:[]},decimals:{lv:1,ok:0,no:0,h:[],sn:[]},algebra:{lv:1,ok:0,no:0,h:[],sn:[]},percentage:{lv:1,ok:0,no:0,h:[],sn:[]},equations:{lv:1,ok:0,no:0,h:[],sn:[]},polygons:{lv:1,ok:0,no:0,h:[],sn:[]},measurementArea:{lv:1,ok:0,no:0,h:[],sn:[]},solids:{lv:1,ok:0,no:0,h:[],sn:[]},volumeMass:{lv:1,ok:0,no:0,h:[],sn:[]},coordGeometry:{lv:1,ok:0,no:0,h:[],sn:[]},ratioRates:{lv:1,ok:0,no:0,h:[],sn:[]},probability:{lv:1,ok:0,no:0,h:[],sn:[]},statistics:{lv:1,ok:0,no:0,h:[],sn:[]},transformations:{lv:1,ok:0,no:0,h:[],sn:[]}};changed=true;}
});if(changed)saveDB(DB);})();
let currentUser=null; // null or {role:'admin'} or {role:'kid',kid:{...}}
let S=null; // Points to current kid's progress (shortcut)

// The app-level settings come from DB.settings
function getProvider(){return DB.settings.provider||'claude';}
function getModel(){return DB.settings.model||'claude-opus-4-6';}

// === LOGIN SCREEN ===
function showLogin(){
  let app=document.getElementById('APP');
  app.innerHTML=`
  <div class="login-wrap">
    <div class="login-box">
      <div class="logo">&#x1F393;</div>
      <h2>Learning Portal</h2>
      <div class="sub">Sign in to start learning</div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter your password">
      </div>
      <button class="login-btn primary" onclick="doLogin()">Sign In</button>
      <div class="login-err" id="loginErr"></div>
      <div style="text-align:center;margin-top:16px">
        <button onclick="showSignup()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;text-decoration:underline">Create a New Account</button>
      </div>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--t2)">
        Admin default: admin / admin123
      </div>
    </div>
  </div>`;
  setTimeout(function(){
    let el=document.getElementById('loginUser');
    if(el)el.focus();
    // Enter key support
    document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
    document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginPass').focus();});
  },100);
}

function doLogin(){
  let u=document.getElementById('loginUser').value.trim().toLowerCase();
  let p=document.getElementById('loginPass').value;
  let err=document.getElementById('loginErr');
  if(!u||!p){err.textContent='Please enter both username and password.';return;}

  // Check admin
  if(u===DB.admin.username.toLowerCase()&&p===DB.admin.password){
    currentUser={role:'admin'};
    S=null;
    showAdminApp();
    return;
  }

  // Check kids
  let kid=DB.kids.find(k=>k.username.toLowerCase()===u&&k.password===p);
  if(kid){
    currentUser={role:'kid',kid:kid};
    S=kid.progress;
    // Ensure data integrity
    ['english','maths'].forEach(s=>Object.keys(S[s]).forEach(t=>{if(!S[s][t].sn)S[s][t].sn=[];}));
    if(!S.ib7)S.ib7={};
    ['wholeNumbers','numberProperties','linesAngles','numberStrategies','posNegNumbers','fractions','decimals','algebra','percentage','equations','polygons','measurementArea','solids','volumeMass','coordGeometry','ratioRates','probability','statistics','transformations'].forEach(function(t){if(!S.ib7[t])S.ib7[t]={lv:1,ok:0,no:0,h:[],sn:[]};if(!S.ib7[t].sn)S.ib7[t].sn=[];});
    if(!S.science)S.science={};
    ['biology','chemistry','physics','earthSpace'].forEach(function(t){if(!S.science[t])S.science[t]={lv:1,ok:0,no:0,h:[],sn:[]};if(!S.science[t].sn)S.science[t].sn=[];});
    if(!S.aiQ)S.aiQ={};
    S.wr=S.wr||[];
    saveDB(DB);
    showKidApp();
    return;
  }

  err.textContent='Wrong username or password. Please try again.';
}

function logout(){
  currentUser=null;
  S=null;
  showLogin();
}

function showSignup(){
  let app=document.getElementById('APP');
  app.innerHTML=`
  <div class="login-wrap">
    <div class="login-box">
      <div class="logo">&#x1F4DD;</div>
      <h2>Create Account</h2>
      <div class="sub">Set up your learning profile</div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="signupName" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Choose a Username</label>
        <input type="text" id="signupUser" placeholder="Pick a username" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Choose a Password</label>
        <input type="password" id="signupPass" placeholder="Create a password (min 4 characters)">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signupPass2" placeholder="Re-enter your password">
      </div>
      <button class="login-btn primary" onclick="doSignup()">Create Account</button>
      <div class="login-err" id="signupErr"></div>
      <div style="text-align:center;margin-top:16px">
        <button onclick="showLogin()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;text-decoration:underline">Back to Sign In</button>
      </div>
    </div>
  </div>`;
  setTimeout(function(){
    let el=document.getElementById('signupName');
    if(el)el.focus();
  },100);
}

function doSignup(){
  let name=document.getElementById('signupName').value.trim();
  let user=document.getElementById('signupUser').value.trim().toLowerCase();
  let pass=document.getElementById('signupPass').value;
  let pass2=document.getElementById('signupPass2').value;
  let err=document.getElementById('signupErr');

  if(!name){err.textContent='Please enter your name.';return;}
  if(!user){err.textContent='Please choose a username.';return;}
  if(user.length<3){err.textContent='Username must be at least 3 characters.';return;}
  if(pass.length<4){err.textContent='Password must be at least 4 characters.';return;}
  if(pass!==pass2){err.textContent='Passwords do not match.';return;}

  // Check if username already taken
  if(user===DB.admin.username.toLowerCase()){err.textContent='That username is already taken. Please choose another.';return;}
  if(DB.kids.find(k=>k.username.toLowerCase()===user)){err.textContent='That username is already taken. Please choose another.';return;}

  // Check max accounts
  if(DB.kids.length>=100){err.textContent='Maximum number of accounts reached. Please contact the admin.';return;}

  // Create the account
  let newKid={
    name:name,
    username:user,
    password:pass,
    created:new Date().toISOString().slice(0,10),
    settings:{theme:'light',avatar:'default'},
    progress:defaultKidProgress()
  };
  DB.kids.push(newKid);
  saveDB(DB);

  // Auto-login the new user
  currentUser={role:'kid',kid:newKid};
  S=newKid.progress;
  if(!S.aiQ)S.aiQ={};
  S.wr=S.wr||[];
  showKidApp();
}

function getActiveKey(){
  if(DB.settings.provider==='gemini') return DB.settings.geminiKey;
  return DB.settings.key;
}

function hasAIKey(){
  return getActiveKey() && getActiveKey().length>5;
}

async function callAI(prompt,maxTokens){
  if(!hasAIKey()) throw new Error('No API key set. Ask your parent/teacher to add an API key in Admin Dashboard > AI Settings.');
  if(DB.settings.provider==='gemini'){
    return await callGemini(prompt,maxTokens);
  } else {
    return await callClaude(prompt,maxTokens);
  }
}

function isHosted(){return location.protocol==='https:'||location.protocol==='http:'&&location.hostname!==''}

async function callClaude(prompt,maxTokens){
  let url=isHosted()?'/api/claude':'https://api.anthropic.com/v1/messages';
  let headers={'Content-Type':'application/json','x-api-key':DB.settings.key,'anthropic-version':'2023-06-01'};
  if(!isHosted())headers['anthropic-dangerous-direct-browser-access']='true';
  let res=await fetch(url,{
    method:'POST',
    headers:headers,
    body:JSON.stringify({model:DB.settings.model,max_tokens:maxTokens||1500,messages:[{role:'user',content:prompt}]})
  });
  let data=await res.json();
  if(data.error) throw new Error('Claude error: '+data.error.message);
  return data.content[0].text;
}

async function callGemini(prompt,maxTokens){
  let modelsToTry=[DB.settings.model||'gemini-2.0-flash','gemini-2.5-flash-preview-05-20','gemini-1.5-flash','gemini-2.0-flash','gemini-1.5-pro'];
  let seen=new Set();
  let lastErr='';
  for(let model of modelsToTry){
    if(seen.has(model))continue;
    seen.add(model);
    try{
      let directUrl='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+DB.settings.geminiKey;
      let url=isHosted()?'/api/gemini?url='+encodeURIComponent(directUrl):directUrl;
      let res=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:maxTokens||1500}})
      });
      let data=await res.json();
      if(data.error){
        let msg=data.error.message||JSON.stringify(data.error);
        if(msg.includes('quota')||msg.includes('rate')||msg.includes('limit')||msg.includes('429')){
          lastErr=msg;
          continue;
        }
        throw new Error('Gemini error ('+model+'): '+msg);
      }
      if(!data.candidates||!data.candidates[0]) throw new Error('Gemini returned no response ('+model+').');
      return data.candidates[0].content.parts[0].text;
    }catch(e){
      if(e.message&&(e.message.includes('quota')||e.message.includes('rate')||e.message.includes('limit'))){
        lastErr=e.message;
        continue;
      }
      throw e;
    }
  }
  throw new Error('All Gemini models are currently over their free quota. This usually resets within a few minutes. Please wait a bit and try again, or switch to Claude in AI Settings. Last error: '+lastErr);
}

function markActive(){
  let d=new Date().toDateString();
  if(S.lastDate===d)return;
  if(S.lastDate){let l=new Date(S.lastDate),n=new Date(d);let diff=Math.floor((n-l)/(86400000));S.streak=diff===1?S.streak+1:1;}
  else S.streak=1;
  S.lastDate=d;sv();
}

s a question mark (?)"},{"id":"p1_9","inst":"Add the correct punctuation mark at the end.","txt":"That is amazing","opts":["That is amazing.","That is amazing?","That is amazing!"],"cor":2,"exp":"This shows a strong feeling (excitement), so it needs an exclamation mark (!)"},{"id":"p1_10","inst":"Choose the sentence with correct capital letters.","txt":"Which sentence is correct","opts":["i live in hong kong.","I live in Hong Kong.","I live in hong kong."],"cor":1,"exp":"Sentences start with a capital. Place names (Hong Kong) also start with capital letters."},{"id":"p1_11","inst":"Add the correct punctuation mark at the end.","txt":"Today is Monday","opts":["Today is Monday.","Today is Monday?","Today is Monday!"],"cor":0,"exp":"This is a statement telling us the day, so it needs a full stop (.)"},{"id":"p1_12","inst":"Add the correct punctuation mark at the end.","txt":"How old are you","opts":["How old are you.","How old are you?","How old are you!"],"cor":1,"exp":"This is a question asking for information, so it needs a question mark (?)"},{"id":"p1_13","inst":"Add the correct punctuation mark at the end.","txt":"Help me","opts":["Help me.","Help me?","Help me!"],"cor":2,"exp":"This is an urgent request showing strong feeling, so it needs an exclamation mark (!)"},{"id":"p1_14","inst":"Choose the sentence with correct punctuation.","txt":"Which is correct","opts":["I have a dog a cat and a fish.","I have a dog, a cat, and a fish.","I have a dog a cat, and a fish."],"cor":1,"exp":"When listing things, we put commas between each item."},{"id":"p1_15","inst":"Add the correct punctuation mark at the end.","txt":"The sky is blue","opts":["The sky is blue.","The sky is blue?","The sky is blue!"],"cor":0,"exp":"This is a statement telling us a fact, so it needs a full stop (.)"}],"2":[{"id":"p2_1","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["Its a sunny day.","It's a sunny day.","Its' a sunny day."],"cor":1,"exp":"It's = it is. The apostrophe replaces the missing letter 'i'."},{"id":"p2_2","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["The dog wagged its tail.","The dog wagged it's tail.","The dog wagged its' tail."],"cor":0,"exp":"'Its' (no apostrophe) shows the tail belongs to the dog. 'It's' means 'it is'."},{"id":"p2_3","inst":"Add the correct punctuation.","txt":"I bought apples oranges and bananas","opts":["I bought apples oranges and bananas.","I bought apples, oranges, and bananas.","I bought apples, oranges and, bananas."],"cor":1,"exp":"Items in a list need commas between them."},{"id":"p2_4","inst":"Choose the sentence with correct apostrophe use.","txt":"Pick the correct one","opts":["The boys hat is red.","The boy's hat is red.","The boys' hat is red."],"cor":1,"exp":"The hat belongs to one boy, so we write boy's (apostrophe before the s)."},{"id":"p2_5","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["\"Hello,\" said Tom.","\"Hello\" said Tom.","Hello, said Tom."],"cor":0,"exp":"Speech needs opening and closing quotation marks. A comma goes before closing the speech."},{"id":"p2_6","inst":"Add the correct punctuation.","txt":"Sarah said I love reading","opts":["Sarah said I love reading.","Sarah said, \"I love reading.\"","Sarah said \"I love reading\""],"cor":1,"exp":"We use a comma after 'said', then quotation marks around the spoken words, with a full stop before the closing mark."},{"id":"p2_7","inst":"Choose the sentence with the correct apostrophe.","txt":"Pick the correct one","opts":["The girls' dresses are blue.","The girl's dresses are blue.","The girls dresses are blue."],"cor":0,"exp":"The dresses belong to more than one girl, so the apostrophe goes after the s: girls'"},{"id":"p2_8","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["We cant go to the park today.","We can't go to the park today.","We cann't go to the park today."],"cor":1,"exp":"Can't = cannot. The apostrophe replaces the missing letters 'no'."},{"id":"p2_9","inst":"Add correct punctuation.","txt":"After school I went home ate dinner and watched TV","opts":["After school I went home ate dinner and watched TV.","After school, I went home, ate dinner, and watched TV.","After school I went home, ate dinner and watched TV."],"cor":1,"exp":"Use a comma after introductory phrases ('After school') and between items in a list of actions."},{"id":"p2_10","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["\"Where are you going?\" asked Mum.","\"Where are you going\" asked Mum?","Where are you going? asked Mum."],"cor":0,"exp":"The question mark goes inside the quotation marks because the spoken words are a question."},{"id":"p2_11","inst":"Choose the correct use of the colon.","txt":"Pick the correct one","opts":["I need: eggs, milk, and bread.","I need the following: eggs, milk, and bread.","I need the following eggs, milk, and bread."],"cor":1,"exp":"A colon comes after a complete sentence that introduces a list."},{"id":"p2_12","inst":"Choose the sentence with correct apostrophe use.","txt":"Pick the correct one","opts":["The childrens' toys are here.","The children's toys are here.","The childrens toys are here."],"cor":1,"exp":"Children is already plural. The apostrophe goes before the s: children's."},{"id":"p2_13","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["However I disagree.","However, I disagree.","However; I disagree."],"cor":1,"exp":"When a sentence starts with a connecting word like 'however', put a comma after it."},{"id":"p2_14","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["Dont touch that.","Don't touch that!","Do'nt touch that."],"cor":1,"exp":"Don't = do not. The apostrophe replaces the 'o'. It's a strong warning so uses an exclamation mark."},{"id":"p2_15","inst":"Choose the sentence with correct punctuation.","txt":"Pick the correct one","opts":["Tom who is my friend is coming.","Tom, who is my friend, is coming.","Tom who is my friend, is coming."],"cor":1,"exp":"Extra information about Tom is separated by commas on both sides."}],"3":[{"id":"p3_1","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["The well-known author \u2014 who wrote over 50 books \u2014 retired last year.","The well known author, who wrote over 50 books retired last year.","The well-known author who wrote over 50 books, retired last year."],"cor":0,"exp":"Dashes (\u2014) can be used like brackets to add extra information. 'Well-known' uses a hyphen because it's a compound adjective."},{"id":"p3_2","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["The students' results were excellent; however, the teacher wanted more effort.","The students results were excellent, however the teacher wanted more effort.","The student's results were excellent; however the teacher wanted more effort."],"cor":0,"exp":"Students' (plural possessive). A semicolon joins two related sentences. 'However' needs a comma after it."},{"id":"p3_3","inst":"Add correct punctuation.","txt":"My three favourite cities are London Paris and Tokyo","opts":["My three favourite cities are London Paris and Tokyo.","My three favourite cities are: London, Paris, and Tokyo.","My three favourite cities are London, Paris, and Tokyo."],"cor":2,"exp":"Items in a list need commas. No colon is needed here because 'are' flows directly into the list."},{"id":"p3_4","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["\"I'll be there soon\", she promised, \"don't worry.\"","\"I'll be there soon,\" she promised, \"don't worry.\"","\"I'll be there soon,\" she promised \"don't worry.\""],"cor":1,"exp":"Commas and full stops go inside quotation marks. A comma after 'promised' introduces the continuation of speech."},{"id":"p3_5","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["The twenty-five-year-old athlete broke the record.","The twenty five year old athlete broke the record.","The twenty-five year-old athlete broke the record."],"cor":0,"exp":"When a multi-word phrase (twenty-five-year-old) is used as an adjective before a noun, all parts are hyphenated."},{"id":"p3_6","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["Its important to note: the experiment failed.","It's important to note that the experiment failed.","Its important to note, that the experiment failed."],"cor":1,"exp":"It's = it is. No colon needed because the sentence flows naturally. No comma before 'that' in this structure."},{"id":"p3_7","inst":"Choose the sentence with correct semicolon use.","txt":"Pick the correct one","opts":["I like dogs; and cats.","I like dogs; cats are okay too.","I like; dogs and cats."],"cor":1,"exp":"A semicolon connects two complete sentences that are closely related."},{"id":"p3_8","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["The recipe needs: flour, sugar, eggs, and butter.","The recipe needs the following ingredients: flour, sugar, eggs, and butter.","The recipe needs, flour, sugar, eggs and butter."],"cor":1,"exp":"A colon should follow a complete sentence. 'The recipe needs' is not complete on its own, but with 'the following ingredients' it becomes complete."},{"id":"p3_9","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["The teacher asked, \"Who can solve this problem?\"","The teacher asked \"Who can solve this problem\"?","The teacher asked, \"who can solve this problem?\""],"cor":0,"exp":"Comma after 'asked'. Capital W for the start of speech. Question mark inside the quotation marks."},{"id":"p3_10","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["My mother in law's house is nearby.","My mother-in-law's house is nearby.","My mother-in-laws house is nearby."],"cor":1,"exp":"Mother-in-law is hyphenated. The possessive 's goes at the end of the whole compound word."},{"id":"p3_11","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["Dear Mr. Smith,\nThank you for your letter.","Dear Mr Smith\nThank you for your letter.","Dear Mr. Smith;\nThank you for your letter"],"cor":0,"exp":"In a formal letter, use a full stop after Mr., a comma after the name, and proper sentence punctuation."},{"id":"p3_12","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["Furthermore the evidence suggests \u2014 rather strongly \u2014 that change is needed.","Furthermore, the evidence suggests \u2014 rather strongly \u2014 that change is needed.","Furthermore, the evidence suggests, rather strongly, that change is needed."],"cor":1,"exp":"Comma after 'Furthermore'. Dashes for the parenthetical emphasis 'rather strongly'."},{"id":"p3_13","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["She shouted, \"Stop!\" but nobody listened.","She shouted \"Stop\"! but nobody listened.","She shouted, \"Stop!\" But nobody listened."],"cor":0,"exp":"Comma before the quote, exclamation inside the marks, lowercase 'but' because the sentence continues."},{"id":"p3_14","inst":"Choose the sentence with correct punctuation.","txt":"Pick the correct one","opts":["The self motivated student passed; she was, of course, very proud.","The self-motivated student passed; she was, of course, very proud.","The self-motivated student passed, she was of course very proud."],"cor":1,"exp":"Self-motivated needs a hyphen. Semicolon joins two sentences. 'Of course' is parenthetical so needs commas."},{"id":"p3_15","inst":"Choose the correctly punctuated sentence.","txt":"Pick the correct one","opts":["To summarise, the following points were raised: cost, time, and quality.","To summarise the following points were raised: cost, time, and quality.","To summarise, the following points were raised; cost, time, and quality."],"cor":0,"exp":"Comma after 'To summarise'. Colon (not semicolon) introduces the list."}]};
