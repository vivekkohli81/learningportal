  html+='</div></div>';

  // Trend indicator
  if(analysis.trend!==null){
    var tC=analysis.trend>0?'#065f46':analysis.trend<0?'#991b1b':'#64748b';
    var tBg=analysis.trend>0?'#d1fae5':analysis.trend<0?'#fee2e2':'#f8fafc';
    var tIcon=analysis.trend>0?'📈':analysis.trend<0?'📉':'➡️';
    html+='<div style="padding:12px;background:'+tBg+';border-radius:var(--r);margin-top:8px;font-size:14px;color:'+tC+'">'+tIcon+' <strong>Trend:</strong> Recent 5 quizzes averaged '+analysis.last5Avg+'% vs previous 5 at '+analysis.prev5Avg+'% ('+(analysis.trend>0?'+':'')+analysis.trend+'%)</div>';
  }
  html+='</div>';

  // === TOPIC ACCURACY CHART (bar chart using divs) ===
  html+='<div class="cd"><h3>📊 Topic-by-Topic Accuracy</h3><div class="ds">Sorted by accuracy — red areas need the most attention</div>';
  var sorted=analysis.allTopics.slice().sort(function(a,b){return (a.accuracy||0)-(b.accuracy||0);});
  if(sorted.length===0){
    html+='<div class="ds">Not enough data yet. Need at least 3 questions attempted per topic.</div>';
  } else {
    sorted.forEach(function(t){
      var barColor=t.accuracy>=80?'#10b981':t.accuracy>=60?'#f59e0b':'#ef4444';
      var label=(topicNames[t.topic]||t.topic);
      var subjLabel=t.subject.charAt(0).toUpperCase()+t.subject.slice(1);
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      html+='<div style="width:150px;font-size:13px;text-align:right;flex-shrink:0"><span style="color:var(--t2);font-size:11px">'+subjLabel+'</span><br>'+label+'</div>';
      html+='<div style="flex:1;background:var(--b);border-radius:6px;height:24px;overflow:hidden;position:relative">';
      html+='<div style="height:100%;width:'+t.accuracy+'%;background:'+barColor+';border-radius:6px;transition:width 0.5s"></div>';
      html+='<span style="position:absolute;right:8px;top:3px;font-size:12px;font-weight:600">'+t.accuracy+'% (L'+t.level+')</span>';
      html+='</div></div>';
    });
  }
  html+='</div>';

  // === WEAK AREAS & RECOMMENDATIONS ===
  if(analysis.weakAreas.length>0){
    html+='<div class="cd" style="border-left:4px solid var(--e)"><h3>⚠️ Areas Needing Focus</h3>';
    html+='<div class="ds">These topics have below 50% accuracy and need extra practice.</div>';
    analysis.weakAreas.forEach(function(w){
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--el);border-radius:var(--r);margin-bottom:8px">';
      html+='<div><strong>'+(topicNames[w.topic]||w.topic)+'</strong> <span style="color:var(--t2);font-size:12px">('+w.subject+')</span></div>';
      html+='<div style="display:flex;align-items:center;gap:12px"><span class="badge" style="background:#fee2e2;color:#991b1b">'+w.accuracy+'% accuracy</span><span style="font-size:12px;color:var(--t2)">Level '+w.level+' | '+w.total+' Qs</span></div>';
      html+='</div>';
    });
    html+='</div>';
  }

  // === RECENT SESSION HISTORY ===
  if(analysis.recentSessions.length>0){
    html+='<div class="cd"><h3>📋 Recent Quiz History</h3>';
    html+='<table class="tb"><tr><th>Date</th><th>Subject</th><th>Topic</th><th>Score</th><th>Result</th></tr>';
    analysis.recentSessions.slice(0,15).forEach(function(s){
      var pct=s.pct||0;
      var badge=pct>=80?'<span class="badge b1">Excellent</span>':pct>=60?'<span class="badge b2">Good</span>':'<span class="badge" style="background:#fee2e2;color:#991b1b">Needs Work</span>';
      html+='<tr><td style="font-size:12px">'+s.date+'</td><td>'+s.subject+'</td><td>'+(topicNames[s.topic]||s.topic)+'</td><td>'+s.score+'/'+s.total+'</td><td>'+badge+'</td></tr>';
    });
    html+='</table></div>';
  }

  // === ACTIVITY HEATMAP (last 14 days) ===
  html+='<div class="cd"><h3>📅 Activity Heatmap (Last 14 Days)</h3>';
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px">';
  for(var i=13;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var dStr=d.toDateString();
    var dayData=analysis.activityDays[dStr];
    var count=dayData?dayData.count:0;
    var avgPct=dayData&&count>0?Math.round(dayData.totalPct/count):0;
    var cellColor=count===0?'#e2e8f0':count<=2?'#bbf7d0':count<=4?'#4ade80':'#16a34a';
    var dayLabel=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    var dateLabel=(d.getMonth()+1)+'/'+d.getDate();
    html+='<div style="text-align:center;min-width:54px"><div style="font-size:10px;color:var(--t2)">'+dayLabel+'</div>';
    html+='<div style="width:50px;height:50px;background:'+cellColor+';border-radius:8px;display:flex;align-items:center;justify-content:center;color:'+(count>0?'#fff':'var(--t2)')+';font-weight:600;font-size:'+(count>0?'16px':'12px')+'">'+(count>0?count:'-')+'</div>';
    html+='<div style="font-size:10px;color:var(--t2)">'+dateLabel+'</div>';
    if(count>0) html+='<div style="font-size:9px;color:var(--t2)">'+avgPct+'% avg</div>';
    html+='</div>';
  }
  html+='</div><div style="margin-top:8px;font-size:12px;color:var(--t2)">Number shown = quizzes completed that day</div></div>';

  // === EXPORT PERFORMANCE DATA ===
  html+='<div class="cd"><h3>📤 Export Performance Data</h3>';
  html+='<div class="ds">Download a summary of performance data as JSON (useful for tracking or sharing with tutors).</div>';
  html+='<button class="bt bp" onclick="exportPerformanceJSON()" style="margin-top:8px">Export Performance JSON</button></div>';

  return html;
}

function exportPerformanceJSON(){
  // Find selected kid
  var sel=document.getElementById('progressKid');
  if(!sel||sel.value==='all') return alert('Please select a specific student first.');
  var idx=parseInt(sel.value);
  var k=DB.kids[idx];
  if(!k) return;
  var analysis=analyzePerformance(k.progress);
  var data={
    student:k.name,
    exportDate:new Date().toISOString(),
    overallAccuracy:analysis.overallAccuracy,
    totalQuizzes:analysis.totalCompleted,
    streak:analysis.streak,
    daysActive30:analysis.daysActive30,
    weakAreas:analysis.weakAreas.map(function(w){return {topic:w.topic,subject:w.subject,accuracy:w.accuracy,level:w.level};}),
    strongAreas:analysis.strongAreas.map(function(s){return {topic:s.topic,subject:s.subject,accuracy:s.accuracy,level:s.level};}),
    recentSessions:analysis.recentSessions.slice(0,20),
    trend:analysis.trend,
    writings:analysis.writings
  };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=k.name+'_performance_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// === INITIALIZE APP ===
showLogin();
